<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Niftzy template is fully responsive, clean design and use latest bootstrap 5 version">
    <meta name="keywords"
        content="Nft template,Best nft design, unique design, bootstrap template, responsive template, web app">
    <meta name="author" content="">
    <title>Niftzy- Best NFT template</title>

    <!-- Favicon icon -->
    <link rel="icon" href="../assets/images/favicon.png" type="image/x-icon">
    <link rel="shortcut icon" href="../assets/images/favicon.png" type="image/x-icon">

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Cursosr css link -->
    <link rel="stylesheet" href="../assets/css/normalize.min.css">

    <!-- custom main css file -->
    <link rel="stylesheet" href="../assets/css/main.css">

</head>

<body class="body-bg">
    <main>
        <!-- The cursor elements Start -->
        <div class="cursor"></div>
        <!-- The cursor elements End -->

        <!-- Authentication Section Start -->
        <section class="authentication-section-1 authentication-section-2 p-0">
            <div class="custom-sm-container">
                <div class="row justify-content-center">
                    <div class="col-xl-5 col-md-7">
                        <div class="author-main-box">
                            <div>
                                <div class="author-image text-center">
                                    <img src="../assets/images/logo.png" class="img-fluid" alt="">
                                </div>
                                <div class="author-title text-center">
                                    <h3>Log in to your account</h3>
                                    <h6>Welcome back! Please enter your details.</h6>
                                </div>
                                <form class="author-form">
                                    <div class="author-box">
                                        <label for="email" class="form-label">Email address</label>
                                        <input type="email" class="form-control" id="email"
                                            placeholder="Enter your email">
                                    </div>
                                    <div class="author-box">
                                        <label for="pass" class="form-label">Password</label>
                                        <input type="password" class="form-control" id="pass"
                                            placeholder="Enter your Password">
                                    </div>
                                    <div class="authore-flex author-box">
                                        <div>
                                            <div class="author-checkbox">
                                                <input type="checkbox" class="form-check-input checkbox-animated"
                                                    id="check1">
                                                <label class="form-check-label" for="check1">Remember for 30
                                                    days</label>
                                            </div>
                                        </div>
                                        <a href="forgot.html" class="forgot-text">Forgot Password</a>
                                    </div>

                                    <div class="author-box">
                                        <a href="index.html" class="btn btn-submit author-button">Sign in</a>
                                    </div>

                                    <div class="author-dividor">
                                        <span>OR</span>
                                    </div>

                                    <ul class="social-media-list">
                                        <li>
                                            <a href="www.google.com" class="social-box">
                                                <img src="../assets/images/icons/google.svg" alt="" class="img-fluid">
                                                <span>Sign in with Google</span>
                                            </a>
                                        </li>

                                        <li>
                                            <a href="www.facebook.com" class="social-box">
                                                <img src="../assets/images/icons/facebook-2.svg" alt=""
                                                    class="img-fluid">
                                                <span>Sign in with Facebook</span>
                                            </a>
                                        </li>

                                        <li>
                                            <a href="www.apple.com" class="social-box">
                                                <img src="../assets/images/icons/apple.svg" alt="" class="img-fluid">
                                                <span>Sign in with Apple</span>
                                            </a>
                                        </li>
                                    </ul>

                                    <label class="author-2">Don't have an account? <a href="sign-up.html">Sign
                                            up</a>
                                    </label>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- Authentication Section End -->
    </main>

    <!-- jquery js file link -->
    <script src="../assets/js/jquery-3.6.3.js"></script>

    <!-- bootstrap js file link -->
    <script src="../assets/js/bootstrap.bundle.min.js"></script>

    <!-- Custom Curser Js -->
    <script src='../assets/js/kinet.min.js'></script>

    <!-- Script Js -->
    <script src="../assets/js/script.js"></script>

    <!-- Menu js file link -->
    <script src="../assets/js/menu.js"></script>
</body>

</html>
