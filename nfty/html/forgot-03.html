<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Niftzy template is fully responsive, clean design and use latest bootstrap 5 version" />
    <meta name="keywords"
        content="Nft template,Best nft design, unique design, bootstrap template, responsive template, web app" />
    <meta name="author" content="" />
    <title>Niftzy- Best NFT template</title>

    <!-- Favicon icon -->
    <link rel="icon" href="../assets/images/favicon.png" type="image/x-icon" />
    <link rel="shortcut icon" href="../assets/images/favicon.png" type="image/x-icon" />

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Cursosr css link -->
    <link rel="stylesheet" href="../assets/css/normalize.min.css">

    <!-- custom main css file -->
    <link rel="stylesheet" href="../assets/css/main.css">

<body class="body-bg">
    <main>
        <!-- The cursor elements Start -->
        <div class="cursor"></div>
        <!-- The cursor elements End -->

        <!-- Authentication Section Start -->
        <div class="authentication-section-2 authentication-section-1">
            <div class="custom-sm-container">
                <div class="row justify-content-center">
                    <div class="col-md-5">
                        <div class="author-main-box">
                            <div>
                                <div class="author-image text-center">
                                    <img src="../assets/images/logo.png" class="img-fluid" alt="">
                                </div>
                                <div class="author-title text-center">
                                    <h3>Set new password</h3>
                                    <h6>Your new password must be different from passwords you've previously used.</h6>
                                </div>
                                <form class="author-form">
                                    <div class="author-box">
                                        <label for="pass" class="form-label">Password</label>
                                        <input type="password" class="form-control" id="pass"
                                            placeholder="Enter your Password">
                                        <div id="emailHelp" class="form-text">Must be at least 8 characters.</div>
                                    </div>
                                    <div class="author-box">
                                        <label for="pass1" class="form-label">Confirm password</label>
                                        <input type="password" class="form-control" id="pass1"
                                            placeholder="Enter your conform password">
                                    </div>

                                    <div class="author-box">
                                        <a href="index.html" class="btn btn-submit author-button">Reset password</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Authentication Section End -->
    </main>

    <!-- jquery js file link -->
    <script src="../assets/js/jquery-3.6.3.js"></script>

    <!-- bootstrap js file link -->
    <script src="../assets/js/bootstrap.bundle.min.js"></script>

    <script src="../assets/js/script.js"></script>

    <script src="../assets/js/menu.js"></script>
