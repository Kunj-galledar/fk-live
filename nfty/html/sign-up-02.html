<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Niftzy template is fully responsive, clean design and use latest bootstrap 5 version" />

        content="Nft template,Best nft design, unique design, bootstrap template, responsive template, web app" />

    <title>Niftzy- Best NFT template</title>

    <!-- Favicon icon -->
    <link rel="icon" href="../assets/images/favicon.png" type="image/x-icon" />
    <link rel="shortcut icon" href="../assets/images/favicon.png" type="image/x-icon" />

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/normalize.min.css">

<body class="body-bg">
    <main>
        <!-- The cursor elements Start -->
        <div class="cursor"></div>
        <!-- The cursor elements End -->

        <!-- Authentication Section Start -->
        <div class="authentication-section-2 authentication-section-1">
            <div class="container-fluid p-0">
                <div class="row justify-content-center">
                    <div class="col-md-6 d-xl-block d-none">
                        <div class="author-left-image">
                            <img src="../assets/images/products/4.jpg" class="img-fluid" alt="">
                        </div>
                    </div>
                    <div class="col-xl-6">
                        <div class="row justify-content-center">
                            <div class="col-xxl-8 col-xl-10">
                                <div class="author-main-box">
                                    <div>
                                        <div class="author-image text-center">
                                            <img src="../assets/images/logo.png" class="img-fluid" alt="">
                                        </div>
                                        <div class="author-title text-center">
                                            <h3>Log in to your account</h3>
                                            <h6>Welcome back! Please enter your details.</h6>
                                        </div>
                                        <form class="author-form">
                                            <div class="author-box">
                                                <label for="email" class="form-label">Name</label>
                                                <input type="text" class="form-control" id="email"
                                                    placeholder="Enter your name">
                                            </div>
                                            <div class="author-box">
                                                <label for="email" class="form-label">Email address</label>
                                                <input type="email" class="form-control" id="email"
                                                    placeholder="Enter your email">
                                            </div>
                                            <div class="author-box">
                                                <label for="pass" class="form-label">Password</label>
                                                <input type="password" class="form-control" id="pass"
                                                    placeholder="Enter your Password">
                                                <div id="emailHelp" class="form-text">Must be at least 8 characters.
                                                </div>
                                            </div>

                                            <div class="author-box">
                                                <a href="index.html" class="btn btn-submit author-button">Sign up</a>
                                            </div>

                                            <div class="author-dividor">
                                                <span>OR</span>
                                            </div>

                                            <ul class="social-media-list">
                                                <li>
                                                    <a href="www.google.com" class="social-box">
                                                        <img src="../assets/images/icons/google.svg" alt=""
                                                            class="img-fluid">
                                                        <span>Sign up with Google</span>
                                                    </a>
                                                </li>

                                                <li>
                                                    <a href="www.facebook.com" class="social-box">
                                                        <img src="../assets/images/icons/facebook-2.svg" alt=""
                                                            class="img-fluid">
                                                        <span>Sign up with Facebook</span>
                                                    </a>
                                                </li>

                                                <li>
                                                    <a href="www.apple.com" class="social-box">
                                                        <img src="../assets/images/icons/apple.svg" alt=""
                                                            class="img-fluid">
                                                        <span>Sign up with Apple</span>
                                                    </a>
                                                </li>
                                            </ul>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Authentication Section End -->

    <!-- jquery js file link -->
    <script src="../assets/js/jquery-3.6.3.js"></script>

    <script src="../assets/js/bootstrap.bundle.min.js"></script>
