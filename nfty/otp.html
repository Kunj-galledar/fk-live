<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="nfty" />
    <meta name="keywords" content="nfty" />
    <meta name="author" content="nfty" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" href="assets/images/logo/logo.png" type="image/x-icon" />
    <title>nfty App</title>
    <link rel="icon" href="assets/images/logo/logo.png" type="image/x-icon" />
    <link rel="apple-touch-icon" href="assets/images/logo/logo.png" />
    <meta name="theme-color" content="#ff4c3b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="nfty" />
    <meta name="msapplication-TileImage" content="assets/images/logo/logo.png" />
    <meta name="msapplication-TileColor" content="#FFFFFF" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- bootstrap css -->
    <link rel="stylesheet" id="rtl-link" type="text/css" href="assets/css/vendors/bootstrap.css" />

    <!-- remixicon css -->
    <link rel="stylesheet" type="text/css" href="assets/css/vendors/remixicon.css" />

    <!-- Theme css -->
    <link rel="stylesheet" id="change-link" type="text/css" href="assets/css/style.css" />
  </head>
  <body>
    <!-- otp section Start -->
    <header>
      <div class="custom-container">
        <div class="auth-title">
          <h1>Enter Pin Code</h1>
          <h4>Create a Pin Code</h4>
          <p>Create a 5 Digit PIN code that will be used every time you login.</p>
        </div>
      </div>
    </header>

    <div class="custom-container">
      <form class="auth-form otp-form">
        <div class="form-input">
          <input type="text" class="form-control" id="inputnumber1" oninput="digitValidate(this)" onkeyup="tabChange(1)" maxlength="1" />
          <input type="text" class="form-control" id="inputnumber2" oninput="digitValidate(this)" onkeyup="tabChange(2)" maxlength="1" />
          <input type="text" class="form-control" id="inputnumber3" oninput="digitValidate(this)" onkeyup="tabChange(3)" maxlength="1" />
          <input type="text" class="form-control" id="inputnumber4" oninput="digitValidate(this)" onkeyup="tabChange(4)" maxlength="1" />
          <input type="text" class="form-control" id="inputnumber5" oninput="digitValidate(this)" onkeyup="tabChange(5)" maxlength="1" />
        </div>
        <div class="submit">
          <a href="reset-password.html" class="btn-solid">Confirm</a>
        </div>
      </form>
    </div>
    <!-- otp section end -->

    <!-- bootstrap js -->
    <script src="js/bootstrap.bundle.js"></script>

    <!-- otp js -->
    <script src="assets/js/otp.js"></script>

    <!-- feather js   -->
    <script src="assets/js/feather.min.js"></script>
    <script src="assets/js/custom-feather.js"></script>

    <!-- script js -->
    <script src="assets/js/script.js"></script>
  </body>
</html>
