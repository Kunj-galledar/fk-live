<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="nfty" />
    <meta name="keywords" content="nfty" />
    <meta name="author" content="nfty" />
    <link rel="icon" href="assets/images/logo/logo.png" type="image/x-icon" />
    <title>nfty App</title>
    <link rel="icon" href="assets/images/logo/logo.png" type="image/x-icon" />
    <link rel="apple-touch-icon" href="assets/images/logo/logo.png" />
    <meta name="theme-color" content="#ff4c3b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="nfty" />
    <meta name="msapplication-TileImage" content="assets/images/logo/logo.png" />
    <meta name="msapplication-TileColor" content="#FFFFFF" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- bootstrap css -->
    <link rel="stylesheet" id="rtl-link" type="text/css" href="assets/css/vendors/bootstrap.css" />

    <!-- swiper css -->
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css" />

    <!-- remixicon css -->
    <link rel="stylesheet" type="text/css" href="assets/css/vendors/remixicon.css" />

    <!-- pikaday css -->
    <link rel="stylesheet" type="text/css" href="assets/css/pikaday.css" />

    <!-- Theme css -->
    <link rel="stylesheet" id="change-link" type="text/css" href="assets/css/style.css" />
  </head>
  <body>
    <!-- header end -->
    <header class="section-lg-t-space">
      <div class="custom-container">
        <div class="header-panel">
          <a href="#">
            <i class="ri-arrow-left-s-line"></i>
          </a>
          <h3>Make an Offer</h3>
        </div>
      </div>
    </header>
    <!-- header end -->

    <!-- make offer starts -->

    <section class="section-lg-t-space">
      <div class="custom-container">
        <form class="auth-form offer-form">
          <div class="offer-lable">
            <h4>Offer Amount</h4>
            <h4 class="balance">Balance : 324 ETH</h4>
          </div>
          <select class="form-select">
            <option selected>Select Currancy</option>
            <option value="1">Ethereum</option>
            <option value="2">Metamask</option>
            <option value="3">Fortmatic</option>
            <option value="4">Authereum</option>
            <option value="5">Venly</option>
          </select>
          <div class="mb-3 mt-3">
            <input type="number" class="form-control" id="amount" />
          </div>

          <h5>Total Offer Amount : 124.75 ETH ($158,743.66 USD)</h5>

          <div class="mb-3">
            <h3>Offer Expiration</h3>
            <div class="dropdown">
              <select class="form-select">
                <option selected>Select Offer Time</option>
                <option value="1">1 Day</option>
                <option value="2">3 Days</option>
                <option value="3">8 Days</option>
                <option value="4">15 Days</option>
                <option value="5">30 Days</option>
              </select>
            </div>
            <div class="mb-3 mt-3">
              <input type="text" class="form-control" id="datepicker" />
            </div>
          </div>
          <div class="submit">
            <a href="#" class="btn-solid">Make Offer</a>
          </div>
        </form>
      </div>
    </section>
    <!-- make offer end -->

    <!-- tabs.js -->
    <script src="assets/js/tabs.js"></script>
    <!-- bootstrap js -->
    <script src="assets/js/bootstrap.bundle.js"></script>

    <!-- swiper js -->
    <script src="assets/js/swiper-bundle.min.js"></script>
    <script src="assets/js/swiper.js"></script>

    <!-- feather js   -->
    <script src="assets/js/feather.min.js"></script>
    <script src="assets/js/custom-feather.js"></script>

    <!-- pikaday js -->
    <script src="assets/js/pikaday.js"></script>
    <script src="assets/js/custom-pikaday.js"></script>

    <!-- script js -->
    <script src="assets/js/script.js"></script>
  </body>
</html>
