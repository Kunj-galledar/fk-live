<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="nfty" />
    <meta name="keywords" content="nfty" />
    <meta name="author" content="nfty" />
    <link rel="icon" href="assets/images/logo/logo.png" type="image/x-icon" />
    <title>nfty App</title>
    <link rel="icon" href="assets/images/logo/logo.png" type="image/x-icon" />
    <link rel="apple-touch-icon" href="assets/images/logo/logo.png" />
    <meta name="theme-color" content="#ff4c3b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="nfty" />
    <meta name="msapplication-TileImage" content="assets/images/logo/logo.png" />
    <meta name="msapplication-TileColor" content="#FFFFFF" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- bootstrap css -->
    <link rel="stylesheet" id="rtl-link" type="text/css" href="assets/css/vendors/bootstrap.css" />

    <!-- swiper css -->
    <link rel="stylesheet" href="assets/css/swiper-bundle.min.css" />

    <!-- remixicon css -->
    <link rel="stylesheet" type="text/css" href="assets/css/vendors/remixicon.css" />

    <!-- Theme css -->
    <link rel="stylesheet" id="change-link" type="text/css" href="assets/css/style.css" />
  </head>
  <body>
    <!-- header start -->
    <header class="section-lg-t-space">
      <div class="custom-container">
        <div class="header-panel">
          <a href="home.html">
            <i class="ri-arrow-left-s-line"></i>
            <h3>My Wallet</h3>
          </a>
        </div>
      </div>
    </header>
    <!-- header end -->

    <!-- setting section start -->
    <span id="copyResult"></span>
    <section class="section-lg-t-space">
      <div class="custom-container">
        <div class="wallet-profile">
          <img src="assets/images/product/45.png" alt="Profile" />
          <h2>AndrewNFT</h2>
          <h3>$450,459.63</h3>
          <div class="wallet-id">
            <img class="img-fluid id-pic" src="assets/images/product/1.png" alt="id" />
            <h5>0xb797454...54x2545</h5>
            <!-- <a href="#copy"><i class="ri-file-copy-line"></i></a> -->
            <a type="button" class="btn" id="liveToastBtn"><i class="ri-file-copy-line"></i></a>
          </div>
        </div>
      </div>
    </section>

    <!-- copy alart -->
    <div class="toast-container position-fixed top-0 end-0 p-3">
      <div id="liveToast" class="toast" role="alert">
        <div class="toast-body">Copied!</div>
      </div>
    </div>

    <section class="section-lg-t-space section-lg-b-space">
      <div class="custom-container">
        <div class="category-detail-tab">
          <ul class="nav nav-tabs tab-style2" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="token-tab" data-bs-toggle="tab" data-bs-target="#token" type="button" role="tab">Token</button>
            </li>

            <li class="nav-item" role="presentation">
              <button class="nav-link" id="nft-tab" data-bs-toggle="tab" data-bs-target="#nfy" type="button" role="tab">NFTs</button>
            </li>
          </ul>
        </div>
      </div>
    </section>

    <!-- script js -->
    <script src="assets/js/script.js"></script>

    <!-- tabs.js -->
    <script src="assets/js/tabs.js"></script>
    <!-- bootstrap js -->
    <script src="assets/js/bootstrap.bundle.js"></script>

    <!-- swiper js -->
    <script src="assets/js/swiper-bundle.min.js"></script>
    <script src="assets/js/swiper.js"></script>

    <!-- feather js   -->
    <script src="assets/js/feather.min.js"></script>
    <script src="assets/js/custom-feather.js"></script>

    <!-- script js -->
    <script src="assets/js/script.js"></script>
    <script>
      const toastTrigger = document.getElementById("liveToastBtn");
      const toastLiveExample = document.getElementById("liveToast");
      if (toastTrigger) {
        toastTrigger.addEventListener("click", () => {
          const toast = new bootstrap.Toast(toastLiveExample);

          toast.show();
        });
      }
    </script>
  </body>
</html>
