<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="inter-body theme-color-1">

    <!-- Log In Form Start -->
    <section class="learning-auth">
        <div class="learning-header px-15">
            <div class="home-contain">
                <h2>Enter OTP</h2>
                <h5>An 6 digit code has been sent to +65145454545</h5>
            </div>
        </div>
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <form class="form-style-1 mt-35">
                        <div class="mb-4">
                            <label for="otp" class="form-label">Enter OTP</label>
                            <div class="form-group">
                                <input type="number" class="form-control text-center" placeholder="0" maxlength="1"
                                    id="codeBox1" onkeyup="onKeyUpEvent(1, event)" onfocus="onFocusEvent(1)">
                                <input type="number" class="form-control text-center" placeholder="0" maxlength="1"
                                    id="codeBox2" onkeyup="onKeyUpEvent(2, event)" onfocus="onFocusEvent(2)">
                                <input type="number" class="form-control text-center" placeholder="0" maxlength="1"
                                    id="codeBox3" onkeyup="onKeyUpEvent(3, event)" onfocus="onFocusEvent(3)">
                                <input type="number" class="form-control text-center" placeholder="0" maxlength="1"
                                    id="codeBox4" onkeyup="onKeyUpEvent(4, event)" onfocus="onFocusEvent(4)">
                                <input type="number" class="form-control text-center" placeholder="0" maxlength="1"
                                    id="codeBox5" onkeyup="onKeyUpEvent(5, event)" onfocus="onFocusEvent(5)">
                                <input type="number" class="form-control text-center" placeholder="0" maxlength="1"
                                    id="codeBox6" onkeyup="onKeyUpEvent(6, event)" onfocus="onFocusEvent(6)">
                            </div>
                        </div>
                        <a href="reset-password.html" type="submit" class="btn btn-gradient">Submit</a>
                    </form>
                </div>
            </div>
        </div>
    </section>
    <!-- Log In Form End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Otp js -->
    <script src="../assets/js/otp.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
