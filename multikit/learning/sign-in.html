<body class="inter-body theme-color-1">

    <!-- Log In Form Start -->
    <section class="learning-auth">
        <div class="learning-header px-15">
            <div class="home-contain">
                <h2>Login to Multikit</h2>
                <h5>Enter your credentials to access your account.</h5>
            </div>
        </div>
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <form class="form-style-1 mt-35">
                        <div class="mb-4">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" class="form-control" placeholder="Enter username" id="email">
                        </div>
                        <div>
                            <label for="pass" class="form-label">Password</label>
                            <input type="password" class="form-control" id="pass" placeholder="Password">
                        </div>
                        <a class="forgot-password" href="forgot-password.html">Forgot password?</a>
                        <a href="index.html" class="btn btn-gradient mt-4">Sign in</a>
                        <a href="sign-up.html" class="create-new">If you are new, Create Now</a>
                        <div class="continue-media">
                            <span>Or Continue with</span>
                        </div>
                        <div class="social-style-1">
                            <a href="https://accounts.google.com/signin/v2/challenge/pwd?rart=ANgoxcdbbNxH1nYXChBQ7n_DhSet9sRm1XXzUFTdrodQQJThJv3oPCktvjFuZq-YDK8WsXHW_gXYeU7G-XB1iBPG0qMJAeBgcA&TL=ADFpJfNO0RX76w3_dSTgZpAaaAo5b4pVS_QbxZE9ZcTWHKvMhtzT8sU5qddOsm_4&flowName=GlifWebSignIn&cid=1&flowEntry=ServiceLogin"
                                class="btn">
                                <img src="../assets/images/learning/social/google.svg" alt="">
                                <span>Google</span>
                            </a>
                            <a href="https://appleid.apple.com/" class="btn">
                                <img src="../assets/images/learning/social/apple.svg" alt="">
                                <span>Apple</span>
                            </a>
                            <a href="https://www.facebook.com/login/" class="btn">
                                <img src="../assets/images/learning/social/fb.svg" alt="">
                                <span>Facebook</span>
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
    <!-- Log In Form End -->



    <!-- space box start -->
