<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="multikit">
    <meta name="keywords" content="multikit">
    <title>Multikit - Multi-purpose Html Template</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#ff8d2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="multikit">
    <meta name="msapplication-TileImage" content="../assets/images/favicon/1.svg">
    <meta name="msapplication-TileColor" content="#FFFFFF">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon">
    <link rel="shortcut icon" href="../" type="image/x-icon">

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link id="change-link" rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="rubik-body theme-bg-color chatting-color chatting-onboarding-bg">

    <!-- Header Section Start -->
    <header class="chatting-header">
        <div class="custom-container">
            <div class="header-box">
                <div class="arrow-box">
                    <i class="ri-arrow-left-s-line"></i>
                </div>
                <div class="add-member">
                    <i class="ri-user-add-line"></i>
                </div>
            </div>
        </div>
    </header>
    <!-- Header Section End -->

    <!-- Mobile Section Start -->
    <div class="audio-video-menu-section">
        <ul class="mobile-list">
            <li>
                <a href="javascript:void(0)">
                    <i class="ri-volume-up-line"></i>
                </a>
            </li>

            <li>
                <a href="video-calling.html">
                    <i class="ri-vidicon-line"></i>
                </a>
            </li>

            <li>
                <a href="javascript:void(0)">
                    <i class="ri-mic-off-line"></i>
                </a>
            </li>

            <li>
                <a href="calls.html" class="end-call">
                    <i class="ri-phone-fill"></i>
                </a>
            </li>
        </ul>
    </div>
    <!-- Mobile Section End -->

    <!-- Audio Section Start -->
    <div class="audio-section">
        <div class="custom-container">
            <div class="audio-profile-box">
                <div class="audio-profile-image">
                    <img src="../assets/images/chatting/profile/3.jpg" class="img-fluid" alt="">
                </div>
                <div class="profile-name-time">
                    <h3 class="title-color">Luke Avery</h3>
                    <h2 class="content-color">05:10</h2>
                </div>
            </div>
        </div>
    </div>
    <!-- Audio Section End -->

    <!-- Theme Option Setting Box Start -->
    <div class="theme-setting-box">
        <div class="theme-box">
            <button class="theme-icon">
                <i class="ri-menu-line"></i>
            </button>
            <ul class="theme-option">
                <li>
                    <button class="theme-setting-button" id="rtl-btn">
                        <i class="ri-text-direction-r"></i>
                    </button>
                </li>
                <li>
                    <button class="theme-setting-button" id="dark-btn">
                        <i class="ri-sun-line"></i>
                    </button>
                </li>
                <li>
                    <a href="../landing/index.html" class="theme-setting-button">
                        <i class="ri-home-3-line"></i>
                    </a>
                </li>
            </ul>
        </div>
    </div>
    <!-- Theme Option Setting Box End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>

    <!-- Theme Settings js-->
    <script src="../assets/js/theme-setting.js"></script>
</body>

</html>
