<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="multikit">
    <meta name="keywords" content="multikit">
    <meta name="author" content="multikit">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- swiper link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/swiper-bundle.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="rubik-body theme-bg-color chatting-color">

    <!-- Header Section Start -->
    <header class="chatting-header">
        <div class="custom-container">
            <div class="header-box">
                <div class="left-header">
                    <img src="../assets/images/logo/2.svg" class="img-fluid w-100" alt="">
                </div>
                <div class="right-header">
                    <button class="search-button btn">
                        <i class="ri-search-line"></i>
                    </button>
                    <button class="btn menu-button">
                        <i class="ri-more-2-line"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>
    <!-- Header Section End -->

    <!-- Chatting Box Section Start -->
    <section class="chatting-section new-chat-section">
        <div class="custom-container">
            <form class="form-style-2">
                <div class="title">
                    <h4>Change Password</h4>
                </div>
                <div class="mb-3 chatting-form-control">
                    <input type="password" class="form-control form-control-border" id="old" placeholder="Old password">
                </div>

                <div class="mb-3 chatting-form-control">
                    <input type="password" class="form-control form-control-border" id="new" placeholder="New password">
                </div>

                <div class="mb-3 chatting-form-control">
                    <input type="password" class="form-control form-control-border" id="confirm"
                        placeholder="Confirm new password">
                </div>

                <div class="title mt-4">
                    <h4>Change Number</h4>
                </div>
                <div class="mb-3 chatting-form-control">
                    <input type="number" class="form-control form-control-border" id="number"
                        placeholder="Change Number">
                </div>

                <div class="title mt-4">
                    <h4>Delete Account</h4>
                </div>
                <a href="#deleteAccount" data-bs-toggle="modal" class="content-color">Delete Your Account</a>
            </form>
        </div>
    </section>
    <!-- Chatting Box Section End -->

    <!-- delete modal start -->
    <div class="modal fade delete-modal theme-modal" id="deleteAccount">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title text-danger">Delete your account will:</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal">
                        <i class="ri-close-line"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <ul class="delete-list">
                        <li>Delete your account from Multikit</li>
                        <li>Erase your message history</li>
                        <li>Delete you from all of your groups</li>
                        <li>Delete your drive backup</li>
                    </ul>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-theme btn-light" data-bs-dismiss="modal">No</button>
                    <button class="btn btn-theme btn-light" data-bs-target="#exampleModalToggle2"
                        data-bs-toggle="modal">Yes</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade theme-modal delete-modal-2" id="exampleModalToggle2">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title">Done</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal">
                        <i class="ri-close-line"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <h5>Delete Completed</h5>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-theme btn-light" data-bs-dismiss="modal">Done</button>
                </div>
            </div>
        </div>
    </div>
    <!-- delete modal end -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- swiper js -->
    <script src="../assets/js/swiper-bundle.min.js"></script>
    <script src="../assets/js/custom_swiper.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
