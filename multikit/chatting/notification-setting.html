<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- swiper link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/swiper-bundle.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="rubik-body theme-bg-color chatting-color">

    <!-- Header Section Start -->
    <header class="chatting-header">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="header-box">
                        <a href="setting.html" class="arrow-box title-color">
                            <i class="ri-arrow-left-s-line"></i>
                        </a>
                        <div class="left-header">
                            <img src="../assets/images/logo/2.svg" class="img-fluid w-100" alt="">
                        </div>
                        <div class="right-header">
                            <button class="search-button btn">
                                <i class="ri-search-line"></i>
                            </button>
                            <button class="btn menu-button">
                                <i class="ri-more-2-line"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- Header Section End -->

    <!-- Chatting Box Section Start -->
    <section class="chat-setting-section display-setting-section pb-0">
        <div class="custom-container p-0">
            <div class="row m-0">
                <div class="col-12 p-0">
                    <div class="tile-sm px-15">
                        <h6>Notification Setting</h6>
                    </div>

                    <form class="form-style-3 chat-backup-form px-15">
                        <div class="form-check">
                            <input class="form-check-input checkbox_animated_sm" type="checkbox" value="" id="01">
                            <label class="form-check-label" for="01">
                                <span class="first">Use high priority alerts</span>
                                <span class="second">Display notification previews at the top of the screen.</span>
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input checkbox_animated_sm" type="checkbox" value="" id="02">
                            <label class="form-check-label" for="01">
                                <span class="first">Notices of Response</span>
                                <span class="second">Display alerts of responses to your communications</span>
                            </label>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
    <!-- Chatting Box Section End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- swiper js -->
    <script src="../assets/js/swiper-bundle.min.js"></script>
    <script src="../assets/js/custom_swiper.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
