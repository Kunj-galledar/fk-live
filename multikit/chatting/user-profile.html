<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="rubik-body theme-bg-color chatting-color">

    <!-- Header Section Start -->
    <header class="chatting-header">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="header-box">
                        <div class="left-header">
                            <img src="../assets/images/logo/2.svg" class="img-fluid w-100" alt="">
                        </div>
                        <div class="right-header">
                            <button class="search-button btn">
                                <i class="ri-search-line"></i>
                            </button>
                            <button class="btn menu-button">
                                <i class="ri-more-2-line"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- Header Section End -->

    <!-- Mobile Section Start -->
    <div class="chatting-mobile-section">
        <ul class="mobile-list">
            <li>
                <a href="calls.html">
                    <i class="ri-phone-line unactive-icon"></i>
                    <i class="ri-phone-fill active-icon"></i>
                    <h5>Calls</h5>
                </a>
            </li>

            <li>
                <a href="index.html">
                    <i class="ri-chat-3-line unactive-icon"></i>
                    <i class="ri-chat-3-fill active-icon"></i>
                    <h5>Messages</h5>
                </a>
            </li>

            <li class="">
                <a href="setting.html">
                    <i class="ri-user-3-line unactive-icon"></i>
                    <i class="ri-user-3-fill active-icon"></i>
                    <h5>Profile</h5>
                </a>
            </li>
        </ul>
    </div>
    <!-- Mobile Section End -->

    <!-- User Profile Section Start -->
    <section class="user-profile-section">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="user-profile-box">
                        <div class="user-name">
                            <h4>Luke Avery</h4>
                            <h5>+91 8656 46461</h5>
                        </div>
                        <div class="user-contect">
                            <ul class="contect-list">
                                <li>
                                    <a href="audio-calling.html">
                                        <i class="ri-phone-line"></i>
                                    </a>
                                </li>
                                <li>
                                    <a href="video-calling.html">
                                        <i class="ri-vidicon-line"></i>
                                    </a>
                                </li>
                                <li>
                                    <a href="messaging.html">
                                        <i class="ri-chat-3-line"></i>
                                    </a>
                                </li>
                            </ul>
                        </div>
                        <div class="user-media">
                            <a href="media.html" class="title text-start title-flex">
                                <h4>Media</h4>
                                <h6>8 <i class="ri-arrow-right-s-line"></i></h6>
                            </a>
                            <div class="row g-2">
                                <div class="col-8">
                                    <div class="row g-2">
                                        <div class="col-6">
                                            <img src="../assets/images/chatting/media/1.jpg"
                                                class="img-fluid modal-target" alt="">
                                        </div>
                                        <div class="col-6">
                                            <img src="../assets/images/chatting/media/2.jpg"
                                                class="img-fluid modal-target" alt="">
                                        </div>
                                        <div class="col-7">
                                            <img src="../assets/images/chatting/media/3.jpg"
                                                class="img-fluid modal-target" alt="">
                                        </div>
                                        <div class="col-5">
                                            <img src="../assets/images/chatting/media/5.jpg"
                                                class="img-fluid modal-target" alt="">
                                        </div>
                                    </div>
                                </div>
                                <div class="col-4">
                                    <img src="../assets/images/chatting/media/1.jpg" class="img-fluid modal-target"
                                        alt="">
                                </div>
                            </div>

                            <div id="modal" class="modal">
                                <span id="modal-close" class="modal-close">
                                    <i class="ri-close-line"></i></span>
                                <img id="modal-content" class="modal-content" alt="">
                            </div>
                        </div>
                        <div class="user-setting">
                            <div class="title text-start">
                                <h4>Settings</h4>
                            </div>

                            <ul class="setting-list">
                                <li>
                                    <a href="javascript:void">
                                        <i class="ri-volume-down-line"></i>
                                        <h4>Mute notification</h4>
                                    </a>
                                </li>
                                <li>
                                    <a href="javascript:void">
                                        <i class="ri-user-3-line"></i>
                                        <h4>Add nickname</h4>
                                    </a>
                                </li>
                                <li>
                                    <a href="media.html">
                                        <i class="ri-image-line"></i>
                                        <h4>Media visibility</h4>
                                    </a>
                                </li>
                                <li>
                                    <a href="javascript:void">
                                        <i class="ri-time-line"></i>
                                        <h4>Disappearing messages</h4>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <div class="user-image">
        <img src="../assets/images/chatting/profile/3.jpg" class="img-fluid modal-target" alt="">
    </div>
    <!-- User Profile Section End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- zoom Image js -->
    <script src="../assets/js/zoom-image.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
