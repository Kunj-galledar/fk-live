<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="rubik-body theme-bg-color chatting-color">

    <!-- Header Section Start -->
    <header class="chatting-header prfile-header">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="header-box">
                        <a href="index.html" class="arrow-box title-color">
                            <i class="ri-arrow-left-s-line"></i>
                        </a>
                        <a href="user-profile.html" class="header-profile">
                            <div class="profile-image">
                                <img src="../assets/images/chatting/profile/1.jpg" class="img-fluid" alt="">
                            </div>
                            <div class="name-content">
                                <h5>Michael Anderson</h5>
                                <h6>+91 58784 58125</h6>
                            </div>
                        </a>
                        <div class="calling-box">
                            <a href="audio-calling.html">
                                <i class="ri-phone-line"></i>
                            </a>
                            <a href="video-calling.html">
                                <i class="ri-vidicon-line"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- Header Section End -->

    <!-- Messaging Box Section Start -->
    <div class="message-box">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="msger">
                        <div class="msger-chat">
                            <div class="msg left-msg">
                                <div class="msg-bubble">
                                    <div class="msg-info">
                                        <div class="msg-info-time">12:45</div>
                                    </div>

                                    <div class="msg-text">
                                        Hi, welcome to SimpleChat! Go ahead and send me a message. 😄
                                    </div>
                                </div>
                            </div>

                            <div class="msg right-msg">
                                <div class="msg-bubble">
                                    <div class="msg-info">
                                        <div class="msg-info-time">12:46</div>
                                    </div>

                                    <div class="msg-text">You can change your name in JS section!</div>
                                </div>
                            </div>
                        </div>

                        <form class="msger-inputarea">
                            <div class="position-relative p-0">
                                <input type="text" class="msger-input" placeholder="Enter your message...">
                                <button type="submit" class="msger-send-btn">
                                    <svg>
                                        <use xlink:href="../assets/svg/send.svg#send"></use>
                                    </svg>
                                </button>
                                <button class="btn emoji-button">
                                    <svg class="emoji-icon">
                                        <use xlink:href="../assets/svg/smile.svg#smile"></use>
                                    </svg>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Messaging Box Section End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- messaging chat js -->
    <script src="../assets/js/messaging.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
