<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="multikit">
    <meta name="keywords" content="multikit">
    <meta name="author" content="multikit">
    <link rel="icon" href="assets/images/favicon/1.svg" type="image/x-icon">
    <link rel="shortcut icon" href="./" type="image/x-icon">
    <title>Multikit - Multi-purpose Html Template</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#ff8d2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="multikit">
    <meta name="msapplication-TileImage" content="../assets/images/favicon/1.svg">
    <meta name="msapplication-TileColor" content="#FFFFFF">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link id="change-link" rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="landing-color">
    <!-- Background image start -->
    <div class="background-image">
        <img src="assets/images/landing/bg.png" class="img-fluid" alt="">
    </div>
    <!-- Background image end -->

    <!-- header start -->
    <header class="main-header">
        <div class="header-left">
            <a class="text-white" href="widgets.html">
                <i class="ri-arrow-left-line"></i>
            </a>
            <div class="header-logo">
                <img src="assets/images/logo/1.svg" class="img-fluid" alt="">
            </div>
        </div>

        <div class="header-right">
            <div class="notification-box">
                <a class="text-white" data-bs-toggle="offcanvas" href="#notification" role="button">
                    <i class="ri-notification-2-line"></i>
                </a>
            </div>
        </div>
    </header>
    <!-- header end -->

    <!-- Mobile Section Start -->
    <div class="landing-mobile-section">
        <ul>
            <li>
                <a href="index.html">
                    <i class="ri-home-6-line"></i>
                    <h5>Full Apps</h5>
                </a>
            </li>

            <li>
                <a href="elements.html">
                    <i class="ri-file-copy-line"></i>
                    <h5>Elements</h5>
                </a>
            </li>

            <li>
                <a href="screens.html">
                    <i class="ri-list-check-2"></i>
                    <h5>Screens</h5>
                </a>
            </li>

            <li>
                <a href="widgets.html">
                    <i class="ri-stack-line"></i>
                    <h5>Widgets</h5>
                </a>
            </li>
        </ul>
    </div>
    <!-- Mobile Section End -->

    <!-- Full App Section Start -->
    <section class="full-app-title-section full-app-title-section-2">
        <div class="custom-container">
            <div class="app-box">
                <h4>Range Slider</h4>
                <p>It allows you to select a value or range of values between a specified min and max.</p>
            </div>
        </div>
    </section>
    <!-- Full App Section End -->

    <!-- Progress Bar Box Start -->
    <section class="section-t-space-3 price-range-section">
        <div class="custom-container">
            <div class="landing-title landing-title-2">
                <h4>Pricing</h4>
            </div>
            <div class="flex relative justify-center items-center h-20 w-full mx-auto rounded">
                <div class="range-slider">
                    <div class="progress"></div>
                    <span class="range-min-wrapper">
                        <input class="range-min" type="range" min="0" max="100" value="25">
                    </span>
                    <span class="range-max-wrapper">
                        <input class="range-max" type="range" min="0" max="100" value="100">
                    </span>
                </div>
                <div class="value-box">
                    <div class="min-value numberVal">
                        <input type="number" min="0" max="100" value="25" disabled>
                    </div>
                    <div class="max-value numberVal">
                        <input type="number" min="0" max="100" value="50" disabled>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- Progress Bar Box End -->

    <!-- space box start -->
    <div class="spacing-box"></div>
    <!-- space box end -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Range slider js -->
    <script src="../assets/js/range-slider.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>

    <!-- Theme Settings js-->
    <script src="../assets/js/theme-setting.js"></script>
</body>

</html>
