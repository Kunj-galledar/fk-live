<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="multikit">
    <meta name="keywords" content="multikit">
    <meta name="author" content="multikit">
    <link rel="icon" href="../assets/images/favicon/5.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400;500;600;700;800;900;1000&display=swap">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="fitness-color nunito-body">
    <!-- Header Start -->
    <header class="header-style-6">
        <div class="left-header header-title">
            <a href="step-02.html">
                <i class="ri-arrow-left-s-line"></i>
            </a>
            <h4>Activity Level</h4>
        </div>
    </header>
    <!-- Header End -->

    <!-- Step Line Section Start -->
    <section>
        <div class="custom-container">
            <div class="tab-status">
                <span class="tab active"></span>
                <span class="tab active"></span>
                <span class="tab active"></span>
                <span class="tab"></span>
                <span class="tab"></span>
            </div>
        </div>
    </section>
    <!-- Step Section End -->

    <!-- divider Box Start -->
    <div class="step-divider"></div>
    <!-- divider Box End -->

    <!-- Onboarding Section Start -->
    <section>
        <div class="custom-container">
            <div class="step-content-box">
                <h3>What is your activity level?</h3>
                <p>Select all that apply</p>
            </div>
            <form class="step-box-form">
                <div class="form-check">
                    <input class="form-check-input checkbox_animated" type="checkbox" value="" id="01" checked>
                    <label class="form-check-label" for="01">Sedentary</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input checkbox_animated" type="checkbox" value="" id="02">
                    <label class="form-check-label" for="02">Lightly Active</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input checkbox_animated" type="checkbox" value="" id="03">
                    <label class="form-check-label" for="03">Active</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input checkbox_animated" type="checkbox" value="" id="04">
                    <label class="form-check-label" for="04">Very Active</label>
                </div>
            </form>
            <div class="next-button">
                <a href="step-04.html" class="fitness-btn gradient-btn">Next</a>
            </div>
        </div>
    </section>
    <!-- Onboarding Section End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
