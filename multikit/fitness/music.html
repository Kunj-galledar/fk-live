<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="multikit">
    <meta name="keywords" content="multikit">
    <title>Multikit - Multi-purpose Html Template</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ff8d2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="multikit">
    <meta name="msapplication-TileImage" content="assets/images/favicon/1.svg">
    <meta name="msapplication-TileColor" content="#FFFFFF">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="icon" href="../assets/images/favicon/5.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400;500;600;700;800;900;1000&display=swap">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.rtl.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="fitness-color nunito-body">

    <!-- header Start -->
    <header class="fitness-fix-header">
        <a href="weekly.html" class="arrow-icon">
            <i class="ri-arrow-left-s-line"></i>
        </a>
        <h4>ARM CIRCLES</h4>
        <a href="weekly.html" class="volume-icon">
            <i class="ri-volume-down-line"></i>
        </a>
    </header>
    <!-- header End -->

    <!-- Music Control Box Start -->
    <section class="music-control-section">
        <img src="../assets/images/fitness/exercise-video.jpg" class="img-fluid bg-image" alt="">
        <div class="music-control-box">
            <div class="music-row">
                <span></span>
            </div>
            <div class="music-number">
                <span>02:00</span>
                <span>04:00</span>
            </div>
            <div class="music-control">
                <i class="ri-skip-back-line"></i>
                <i class="ri-pause-circle-line"></i>
                <i class="ri-skip-forward-line"></i>
            </div>
        </div>
    </section>
    <!-- Music Control Box End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
