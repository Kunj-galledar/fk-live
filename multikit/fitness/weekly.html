<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="multikit">
    <meta name="keywords" content="multikit">
    <meta name="author" content="multikit">
    <link rel="icon" href="../assets/images/favicon/5.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400;500;600;700;800;900;1000&display=swap">

    <!-- Bootstrap link -->

    <!-- Remix Icon link -->

    <!-- Style Link -->

<body class="fitness-color nunito-body">

    <!-- header Start -->
    <header class="header-style-9">

            <i class="ri-arrow-left-s-line"></i>

                <li>
                    <a href="#!" class="exercise-box">
                        <div class="exercise-image">
                            <img src="../assets/images/fitness/gif/1.gif" class="img-fluid" alt="">

                            <h4>ARM CIRCLES</h4>
                            <h6>X 6</h6>
                        </div>
                    </a>
                </li>

                <li>
                    <a href="#!" class="exercise-box">
                        <div class="exercise-image">

                        <div class="exercise-contain">
                            <h4>JUMPING JACKS</h4>

                </li>

                <li>
                    <a href="#!" class="exercise-box">
                        <div class="exercise-image">
                            <img src="../assets/images/fitness/gif/3.gif" class="img-fluid" alt="">

                            <h4>KNEE TUCKS</h4>

                            <h4>RUNNING JUMP ROPE</h4>
                            <h6>X 30</h6>
                        </div>
                    </a>
                </li>

                <li>
                    <a href="#!" class="exercise-box">
                        <div class="exercise-image">
                            <img src="../assets/images/fitness/gif/6.gif" class="img-fluid" alt="">

                        <div class="exercise-contain">
                            <h4>DROP SQUATS</h4>
                            <h6>X 6</h6>

            <div class="start-button">
                <a href="#!" class="gradient-btn fitness-btn">Next</a>

    <div class="bottom-space"></div>
    <!-- Divider Section End -->

    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>
