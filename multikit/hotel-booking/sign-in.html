<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="hotel-booking-color">

    <!-- authentication start -->
    <div class="hotel-auth hotel-auth-bg">
        <div class="auth-box">
            <div class="custom-container">
                <div class="row">
                    <div class="col-12">
                        <div class="auth-title">
                            <h2>Login Account</h2>
                        </div>

                        <form class="form-style-5">
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="mail" placeholder="Email address">
                                <label for="mail">Email address</label>
                            </div>
                            <div class="form-floating mb-4">
                                <input type="password" class="form-control" id="password" placeholder="Password">
                                <label for="password">Password</label>
                            </div>
                            <button onclick="location.href = 'index.html';"
                                class="btn btn-gradient btn-gradient-3 mb-3">Login</button>
                            <label class="text-center d-block">
                                <a href="sign-up.html" class="content-color fw-normal">If you are new, Create Now</a>
                            </label>
                            <div class="sign-divider">
                                <span>Or sign in with</span>
                            </div>
                            <ul class="social-style-2">
                                <li>
                                    <a href="https://www.facebook.com/" target="_blank">
                                        <img src="../assets/images/cab-booking/social/fb.svg" alt="">
                                        <h4>Continue with Facebook</h4>
                                    </a>
                                </li>
                                <li>
                                    <a href="https://www.google.com/" target="_blank">
                                        <img src="../assets/images/cab-booking/social/google.svg" alt="">
                                        <h4>Continue with Google</h4>
                                    </a>
                                </li>
                                <li>
                                    <a href="https://www.apple.com/" target="_blank">
                                        <img src="../assets/images/cab-booking/social/apple.svg" alt="">
                                        <h4>Continue with Apple</h4>
                                    </a>
                                </li>
                            </ul>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- authentication end -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
