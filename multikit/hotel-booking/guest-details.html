<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- Swiper css -->
    <link rel="stylesheet" href="../assets/css/swiper-bundle.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="hotel-booking-color">

    <!-- header Section Start -->
    <header class="header-style-4 py-0">
        <div class="top-header px-15 position-relative">
            <div class="left-header">
                <a href="index.html">
                    <i class="ri-arrow-left-s-line"></i>
                </a>
                <div>
                    <h4>Guest Details</h4>
                </div>
            </div>
        </div>
    </header>
    <!-- header Section End -->

    <!-- Review Hotel Section Start -->
    <section class="review-hotel-section section-t-space-2">
        <div class="custom-container">
            <form class="form-style-5">
                <div class="row g-3">
                    <div class="col-3">
                        <div class="form-floating">
                            <select class="form-select" id="floatingSelectGrid">
                                <option selected>Mr.</option>
                                <option value="1">Mrs.</option>
                                <option value="2">Miss.</option>
                            </select>
                            <label for="floatingSelectGrid">Works with selects</label>
                        </div>
                    </div>
                    <div class="col-9">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="fName" placeholder="Full Name">
                            <label for="fName">Enter full name</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="form-floating">
                            <input type="email" class="form-control" id="email" placeholder="Enter your email">
                            <label for="email">Enter your email</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="form-floating">
                            <input type="number" class="form-control" id="floatingInput"
                                placeholder="Enter contact number">
                            <label for="floatingInput">Enter contact number</label>
                        </div>
                    </div>

                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-gradient btn-gradient-outline"><i class="ri-add-line"></i>
                            Add Another Guest</button>
                    </div>
                </div>
            </form>
        </div>
    </section>
    <!-- Review Hotel Section End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- swiper js -->
    <script src="../assets/js/swiper-bundle.min.js"></script>
    <script src="../assets/js/custom_swiper.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
