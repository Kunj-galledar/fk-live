<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

<body class="lato-body food-color food-auth-bg">

    <!-- authentication start -->
    <section class="food-auth food-auth-bg">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <button class="head-arrow btn">
                        <i class="ri-arrow-left-line"></i>
                    </button>

                    <div class="auth-title text-center mb-5">
                        <h3>Enter your phone number</h3>
                        <h4>We will send you a confirmation code</h4>
                    </div>

                    <form action="" class="form-style-4 mb-5">
                        <div>
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="number" class="form-control" id="phone" placeholder="Enter Phone Number">
                        </div>
                    </form>

                    <div class="social-style-3 text-center">
                        <h3>Login with</h3>
                        <ul>
                            <li>
                                <a href="https://www.apple.com/">
                                    <img src="../assets/images/social/apple.svg" class="img-fluid" alt="">
                                </a>
                            </li>
                            <li>
                                <a href="https://www.facebook.com/">
                                    <img src="../assets/images/social/fb.svg" class="img-fluid" alt="">
                                </a>
                            </li>
                            <li>
                                <a href="https://www.google.com/">
                                    <img src="../assets/images/social/google.svg" class="img-fluid" alt="">
                                </a>
                            </li>
                        </ul>
                    </div>

                    <button onclick="location.href = 'otp.html';" class="btn btn-food-btn">Next</button>
                </div>
            </div>
        </div>
    </section>
    <!-- authentication end -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>
