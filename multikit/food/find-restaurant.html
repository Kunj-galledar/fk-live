<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="lato-body food-color food-auth-bg">

    <!-- authentication start -->
    <section class="food-auth food-auth-bg">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="food-auth-box">
                        <a href="index.html" class="head-arrow btn">
                            <i class="ri-arrow-left-line"></i>
                        </a>

                        <div class="auth-title text-center mb-5">
                            <h3>Find restaurant near you</h3>
                            <h4>Please enter your location or allow access to your location to find restaurant near you
                            </h4>
                        </div>

                        <form action="" class="form-style-4 mb-5">
                            <div>
                                <label for="phone" class="form-label">Address location</label>
                                <div class="form-position">
                                    <input type="location" class="form-control" id="phone" placeholder="Enter location">
                                    <i class="ri-send-plane-line"></i>
                                </div>
                            </div>
                        </form>

                        <div class="group-button mt-5">
                            <button onclick="location.href = 'index.html';"
                                class="btn btn-food-btn btn-shadow fw-bold">Save Address</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- authentication end -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
