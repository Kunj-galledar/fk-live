<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="multikit">
    <meta name="keywords" content="multikit">
    <meta name="author" content="multikit">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="lato-body food-color food-auth-bg">

    <!-- Header Section Start -->
    <header class="header-style-3 header-bg">
        <div class="custom-container">
            <div class="header-box-2">
                <a href="payment.html" class="header-icon">
                    <i class="ri-arrow-left-line"></i>
                </a>

                <div class="header-title">
                    <h3>Add New Card</h3>
                </div>
            </div>
        </div>
    </header>
    <!-- Header Section End -->

    <!-- Payment Section Start -->
    <section class="section-t-sm-space payment-section">
        <div class="custom-container">
            <form class="form-style-4">
                <div class="row gx-sm-3 gx-2 gy-4">
                    <div class="col-12">
                        <label for="phone" class="form-label">Card Number</label>
                        <div class="form-position">
                            <input type="number" class="form-control" id="phone" placeholder="0000-0000-0000">
                            <i class="ri-bank-card-line"></i>
                        </div>
                    </div>
                    <div class="col-6">
                        <label for="date" class="form-label">Expiry Date</label>
                        <input type="date" class="form-control" id="date">
                    </div>
                    <div class="col-6">
                        <label for="cvc" class="form-label">CVC/CVV</label>
                        <div class="form-position">
                            <input type="password" class="form-control" id="cvc" placeholder="***">
                            <i class="ri-information-line"></i>
                        </div>
                    </div>
                    <div class="col-12">
                        <label for="holder" class="form-label">Card holder name</label>
                        <input type="text" class="form-control" id="holder" placeholder="Enter cardholder's full name">
                    </div>
                    <div class="col-12">
                        <a href="payment.html" class="btn btn-food-btn">Add Card</a>
                    </div>
                </div>
            </form>
        </div>
    </section>
    <!-- Payment Section End -->

    <!-- Divider Section Start -->
    <div class="bottom-space pb-5"></div>
    <!-- Divider Section End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
