<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="multikit">
    <meta name="keywords" content="multikit">
    <title>Multikit - Multi-purpose Html Template</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#ff8d2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="multikit">
    <meta name="msapplication-TileImage" content="../assets/images/favicon/1.svg">
    <meta name="msapplication-TileColor" content="#FFFFFF">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon">
    <link rel="shortcut icon" href="../" type="image/x-icon">

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link id="change-link" rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="lato-body food-color food-auth-bg">

    <!-- authentication start -->
    <section class="food-auth food-auth-bg">
        <div class="custom-container">
            <div class="food-auth-box">
                <a href="index.html" class="head-arrow btn">
                    <i class="ri-arrow-left-line"></i>
                </a>

                <div class="auth-title text-center mb-5">
                    <h3>Allow access location</h3>
                    <h4>Please enter your location or allow access to your location to find restaurant near you.
                    </h4>
                </div>

                <div class="location-box">
                    <img src="../assets/images/food/map.png" class="img-fluid" alt="">
                </div>

                <div class="group-button mt-5">
                    <button onclick="location.href = 'find-restaurant.html';"
                        class="btn btn-food-btn btn-shadow fw-bold">Use Current
                        Location</button>
                    <button onclick="location.href = 'index.html';"
                        class="btn btn-food-white title-color fw-bold mt-3">Skip</button>
                </div>
            </div>
        </div>
    </section>
    <!-- authentication end -->

    <!-- Theme Option Setting Box Start -->
    <div class="theme-setting-box">
        <div class="theme-box">
            <button class="theme-icon">
                <i class="ri-menu-line"></i>
            </button>
            <ul class="theme-option">
                <li>
                    <button class="theme-setting-button" id="rtl-btn">
                        <i class="ri-text-direction-r"></i>
                    </button>
                </li>
                <li>
                    <button class="theme-setting-button" id="dark-btn">
                        <i class="ri-sun-line"></i>
                    </button>
                </li>
                <li>
                    <a href="../landing/index.html" class="theme-setting-button">
                        <i class="ri-home-3-line"></i>
                    </a>
                </li>
            </ul>
        </div>
    </div>
    <!-- Theme Option Setting Box End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>

    <!-- Theme Settings js-->
    <script src="../assets/js/theme-setting.js"></script>
</body>

</html>
