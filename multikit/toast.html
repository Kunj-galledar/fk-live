<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="./assets/css/vendors/bootstrap.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="assets/css/style.css">
</head>

<body class="landing-color">
    <!-- Background image start -->
    <div class="background-image">
        <img src="assets/images/landing/bg.png" class="img-fluid" alt="">
    </div>
    <!-- Background image end -->

    <!-- header start -->
    <header class="main-header">
        <div class="header-left">
            <a class="text-white" href="widgets.html">
                <i class="ri-arrow-left-line"></i>
            </a>
            <div class="header-logo">
                <img src="assets/images/logo/1.svg" class="img-fluid" alt="">
            </div>
        </div>

        <div class="header-right">
            <div class="notification-box">
                <a class="text-white" data-bs-toggle="offcanvas" href="#notification" role="button">
                    <i class="ri-notification-2-line"></i>
                </a>
            </div>
        </div>
    </header>
    <!-- header end -->

    <!-- Mobile Section Start -->
    <div class="landing-mobile-section">
        <ul>
            <li>
                <a href="index.html">
                    <i class="ri-home-6-line"></i>
                    <h5>Full Apps</h5>
                </a>
            </li>

            <li>
                <a href="elements.html">
                    <i class="ri-file-copy-line"></i>
                    <h5>Elements</h5>
                </a>
            </li>

            <li>
                <a href="screens.html">
                    <i class="ri-list-check-2"></i>
                    <h5>Screens</h5>
                </a>
            </li>

            <li>
                <a href="widgets.html">
                    <i class="ri-stack-line"></i>
                    <h5>Widgets</h5>
                </a>
            </li>
        </ul>
    </div>
    <!-- Mobile Section End -->

    <!-- Full App Section Start -->
    <section class="full-app-title-section full-app-title-section-2">
        <div class="custom-container">
            <div class="app-box">
                <h4>Toast</h4>
                <p>Use any of the following loader while the web page loads to the browser.</p>
            </div>
        </div>
    </section>
    <!-- Full App Section End -->

    <!-- Side Bar Menu Button Start -->
    <div class="side-bar-menu-section px-15 section-t-space-3">
        <ul class="side-bar-menu-list">
            <li>
                <button class="btn btn-gray" id="liveAlertBtn-success">Success Alert</button>
            </li>
            <li class="mt-2 pt-1">
                <button class="btn btn-gray" id="liveAlertBtn">Error Alert</button>
            </li>
        </ul>
    </div>
    <!-- Side Bar Menu Button End -->

    <!-- Toast Start -->
    <div id="liveAlertPlaceholder" class="alert-box"></div>
    <!-- Toast End -->

    <!-- space box start -->
    <div class="spacing-box"></div>
    <!-- space box end -->

    <!-- Bootstrap js-->
    <script src="assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Theme js-->
    <script src="assets/js/script.js"></script>

    <script>
        const alertPlaceholder = document.getElementById('liveAlertPlaceholder')

        const alert = (message, type) => {
            const wrapper = document.createElement('div')
            wrapper.innerHTML = [
                `<div class="alert alert-${type} alert-dismissible" role="alert">`,
                ` <div class="error-text"> <i class="ri-check-line"></i> ${message}</div>`,
                '</div>'
            ].join('')

            alertPlaceholder.append(wrapper)
        }

        const alertTrigger = document.getElementById('liveAlertBtn-success')
        if (alertTrigger) {
            alertTrigger.addEventListener('click', () => {
                alert('Item Successfully Added', 'success')
            })
        }
    </script>
</body>

</html>
