<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="multikit">
    <meta name="keywords" content="multikit">
    <title>Multikit - Multi-purpose Html Template</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ff8d2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="multikit">
    <meta name="msapplication-TileImage" content="assets/images/favicon/1.svg">
    <meta name="msapplication-TileColor" content="#FFFFFF">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="icon" href="../assets/images/favicon/3.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@100;200;300;400;500;600;700;800;900&display=swap">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.rtl.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="grocery-color public-san-body">

    <!-- authentication start -->
    <div class="grocery-authentication">
        <div class="custom-container">
            <div class="logo-content">
                <img src="../assets/images/logo/6.svg" class="img-fluid logo" alt="">
                <p>Online Supermarket for all your daily needs. you are just One Click away from your all needs at
                    your door step.</p>
            </div>
            <div class="auth-box">
                <div class="auth-title">
                    <h4>Login Account</h4>
                </div>

                <form class="form-style-7">
                    <div class="form-box mb-19">
                        <input type="email" class="form-control" placeholder="Email Address">
                        <i class="ri-mail-open-line"></i>
                    </div>
                    <div class="form-box mb-2">
                        <input type="password" class="form-control" placeholder="Password">
                        <i class="ri-lock-line"></i>
                    </div>
                    <h6 class="forgot-text text-end fw-normal mb-19">
                        <a href="forgot-password.html" class="content-color">Forgot password?</a>
                    </h6>
                    <a href="index.html" class="grocery-btn theme-btn">Sign in</a>
                    <h5 class="text-center mt-3">
                        <a href="sign-up.html" class="content-color">If you are new, Create Now</a>
                    </h5>
                    <div class="auth-divider">
                        <label>Or sign in with</label>
                    </div>
                </form>

                <ul class="social-style-5">
                    <li>
                        <a href="https://www.facebook.com/" class="fb-bg" target="_blank">
                            <img src="../assets/images/social/fb.svg" alt="">
                            <h4>Facebook</h4>
                        </a>
                    </li>
                    <li>
                        <a href="https://www.google.com/" class="google-bg" target="_blank">
                            <img src="../assets/images/social/google.svg" alt="">
                            <h4>Google</h4>
                        </a>
                    </li>
                </ul>

                <h5 class="guest-button">
                    <a href="index.html">Continue as guest</a>
                </h5>
            </div>
        </div>
    </div>
    <!-- authentication end -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
