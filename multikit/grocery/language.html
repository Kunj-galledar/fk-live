<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="multikit">
    <meta name="keywords" content="multikit">
    <title>Multikit - Multi-purpose Html Template</title>
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#ff8d2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="multikit">
    <meta name="msapplication-TileImage" content="../assets/images/favicon/1.svg">
    <meta name="msapplication-TileColor" content="#FFFFFF">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="icon" href="../assets/images/favicon/3.svg" type="image/x-icon">
    <link rel="shortcut icon" href="../" type="image/x-icon">

    <!-- Google font css link  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@100;200;300;400;500;600;700;800;900&display=swap">

    <!-- Bootstrap css -->
    <link id="rtl-link" rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- Loader Normalize css -->
    <link rel="stylesheet" type="text/css" href="../assets/css/normalize.min.css">

    <!-- Swiper css -->
    <link rel="stylesheet" type="text/css" href="../assets/css/swiper-bundle.min.css">

    <!-- Remix Icon css -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style css -->
    <link id="change-link" rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="grocery-color public-san-body">
    <!-- Loader Box Start -->
    <div class="min-loader-wrapper">
        <img src="../assets/images/favicon/3.svg" class="img-fluid loader" alt="">
        <div class="loader-section grocery-color section-left"></div>
        <div class="loader-section grocery-color section-right"></div>
    </div>
    <!-- Loader Box End -->

    <!-- header Start -->
    <header class="header-style-6">
        <div class="left-header header-title">
            <a href="address.html">
                <i class="ri-arrow-left-s-line"></i>
            </a>
            <h4>Language</h4>
        </div>
    </header>
    <!-- header End -->

    <!-- Search Section Start -->
    <section>
        <div class="custom-container">
            <form class="form-style-7">
                <div class="form-box search-box mb-19">
                    <input type="text" class="form-control" placeholder="Select Language">
                    <i class="ri-global-line"></i>
                </div>
            </form>
        </div>
    </section>
    <!-- Search Section End -->

    <!-- Select Top Language Section Start -->
    <section class="language-section">
        <div class="custom-container">
            <div class="title">
                <h4>Top Language</h4>
            </div>


            <form class="language-form">
                <div class="language-box">
                    <label class="form-check-label" for="1">English</label>
                    <input class="form-check-input" checked type="radio" name="flexRadioDefault" id="1">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="2">Mandarin</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="2">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="3">Hindi</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="3">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="4">Spanish</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="4">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="5">French</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="5">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="6">Bengali</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="6">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="7">Arabic</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="7">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="8">Russian</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="8">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="9">Portuguese</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="9">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="10">Indonesian</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="10">
                </div>
            </form>
        </div>
    </section>
    <!-- Select Top Language Section End -->

    <!-- Select Other Language Section Start -->
    <section class="section-t-space-3 section-b-space-3 language-section">
        <div class="custom-container">
            <div class="title">
                <h4>Other Language</h4>
            </div>
            <form class="language-form">
                <div class="language-box">
                    <label class="form-check-label" for="11">Portuguese</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="11">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="12">Bengali</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="12">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="13">Japanese</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="13">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="14">Yue Chinese</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="14">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="15">Turkish</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="15">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="16">Vietnamese</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="16">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="17">Standard German</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="17">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="18">Urdu</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="18">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="19">Javanese</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="19">
                </div>
                <div class="language-box">
                    <label class="form-check-label" for="20">Italian</label>
                    <input class="form-check-input" type="radio" name="flexRadioDefault" id="20">
                </div>
            </form>
        </div>
    </section>
    <!-- Select Other Language Section End -->

    <!-- Theme Option Setting Box Start -->
    <div class="theme-setting-box">
        <div class="theme-box">
            <button class="theme-icon text-white">
                <i class="ri-menu-line"></i>
            </button>
            <ul class="theme-option">
                <li>
                    <button class="theme-setting-button" id="rtl-btn">
                        <i class="ri-text-direction-r"></i>
                    </button>
                </li>
                <li>
                    <button class="theme-setting-button" id="dark-btn">
                        <i class="ri-sun-line"></i>
                    </button>
                </li>
                <li>
                    <a href="../landing/index.html" class="theme-setting-button">
                        <i class="ri-home-3-line"></i>
                    </a>
                </li>
            </ul>
        </div>
    </div>
    <!-- Theme Option Setting Box End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/vendors/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Loader js -->
    <script src="../assets/js/loader.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>

    <!-- Theme Settings js-->
    <script src="../assets/js/theme-setting.js"></script>
</body>

</html>
