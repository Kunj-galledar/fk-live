<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="multikit">
    <meta name="keywords" content="multikit">
    <title>Multikit - Multi-purpose Html Template</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ff8d2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="multikit">
    <meta name="msapplication-TileImage" content="assets/images/favicon/1.svg">
    <meta name="msapplication-TileColor" content="#FFFFFF">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="icon" href="../assets/images/favicon/3.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@100;200;300;400;500;600;700;800;900&display=swap">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.rtl.min.css">

    <!-- Swiper css -->
    <link rel="stylesheet" type="text/css" href="../assets/css/swiper-bundle.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="grocery-color public-san-body">

    <!-- header Start -->
    <header class="header-style-6">
        <div class="left-header">
            <button type="button" class="btn menu-btn" data-bs-toggle="offcanvas" data-bs-target="#sideMenu">
                <i class="ri-menu-2-line"></i></button>
            <img src="../assets/images/logo/6.svg" class="img-fluid" alt="">
        </div>

        <div class="right-header">
            <a href="profile.html" class="profile-image">
                <img src="../assets/images/grocery/dp.jpg" class="img-fluid" alt="">
            </a>
        </div>
    </header>
    <!-- header End -->

    <!-- Mobile Section Start -->
    <div class="mobile-style-6">
        <ul>
            <li>
                <a href="index.html" class="mobile-box">
                    <i class="ri-home-line"></i>
                    <h6>Home</h6>
                </a>
            </li>

            <li>
                <a href="category.html" class="mobile-box">
                    <i class="ri-file-copy-line"></i>
                    <h6>Category</h6>
                </a>
            </li>

            <li>
                <a href="search.html" class="mobile-box">
                    <i class="ri-search-line"></i>
                    <h6>Search</h6>
                </a>
            </li>

            <li>
                <a href="cart.html" class="mobile-box">
                    <i class="ri-shopping-cart-line"></i>
                    <h6>Cart</h6>
                </a>
            </li>

            <li>
                <a href="account.html" class="mobile-box">
                    <i class="ri-user-3-line"></i>
                    <h6>Profile</h6>
                </a>
            </li>
        </ul>
    </div>
    <!-- Mobile Section End -->

    <!-- 404 Section Start -->
    <section class="error-page">
        <div class="custom-container">
            <div class="error-box">
                <div class="error-image">
                    <img src="../assets/images/grocery/404.png" class="img-fluid" alt="404 image">
                </div>
                <div class="error-contain">
                    <p>We apologies; we were unable to locate the page you requested. Return to the home page, if you
                        would.</p>
                    <a href="index.html" class="grocery-btn theme-btn">Go Back</a>
                </div>
            </div>
        </div>
    </section>
    <!-- 404 Section End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
