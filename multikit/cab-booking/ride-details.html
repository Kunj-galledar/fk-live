<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&family=Rubik:wght@300;400;500;600;700;800;900&display=swap">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- Map link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/leaflet.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="roboto-body cab-booking-color">

    <!-- map section start -->
    <section class="map-section">
        <div id="map"></div>
    </section>
    <!-- map section end -->

    <!-- Booking section start -->
    <section class="ride-details-section">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="ride-details-box">
                        <div class="ride-title-flex">
                            <div class="left-title">
                                <h3>Choose a Ride</h3>
                            </div>
                            <div class="right-title">
                                <i class="ri-user-3-line"></i>
                                <h5>My Self</h5>
                            </div>
                        </div>

                        <div class="select-ride">
                            <div class="cab-box">
                                <div class="cab-image">
                                    <img src="../assets/images/cab-booking/cab/1.png" class="cab-image img-fluid"
                                        alt="">
                                    <img src="../assets/images/cab-booking/cab/shape.svg" class="shape-image" alt="">
                                </div>
                                <div class="cab-detail">
                                    <div class="cab-name">
                                        <h4>Mini</h4>
                                        <h5>Comfy, economical cars</h5>
                                    </div>
                                    <div class="cab-time">
                                        <h4>5 min</h4>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <ul class="cab-price-detail">
                            <li>
                                <div class="cab-price-box">
                                    <h4 class="name">Estimated Fare</h4>
                                    <h4 class="price">$15</h4>
                                </div>
                            </li>

                            <li>
                                <div class="cab-price-box">
                                    <h4 class="name">Capacity</h4>
                                    <h4 class="price">1-4</h4>
                                </div>
                            </li>

                            <li class="last-box">
                                <div class="cab-price-box">
                                    <h4 class="name">Estimated Fare</h4>
                                    <a href="javascript:void(0)" class="coupon-link">
                                        <h4 class="price">Apply Coupon</h4>
                                    </a>
                                </div>
                            </li>

                            <li>
                                <div class="total-price-box">
                                    <h3>Payable amount</h3>
                                    <h4>$15</h4>
                                </div>
                            </li>
                        </ul>

                        <a href="payment.html" class="find-button btn">Pay Now</a>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- Booking section end -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Map js -->
    <script src="../assets/js/leaflet.js"></script>
    <script src="../assets/js/custom-map.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
