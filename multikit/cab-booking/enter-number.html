<body class="roboto-body cab-booking-color">

    <!-- number section start -->
    <section class="number-section">
        <div class="custom-container">
            <div class="number-title">
                <h2>Enter Number</h2>
                <h4>Please enter country code and enter phone number to verify</h4>
                <form class="form-style-3">
                    <div class="cab-form-control">
                        <input id="demo-country-picker" class="form-control w-100" data-dropdown="true"
                            data-input-style="box" data-label-style="stacked" placeholder="Please select...">
                    </div>
                    <div class="mb-2 cab-form-control">
                        <input type="number" class="form-control" id="password" placeholder="Phone Number">
                        <i class="ri-phone-line"></i>
                    </div>
                    <a href="verify-number.html"
                        class="cab-button cab-button-gradient d-block text-center w-100 mt-4">Send Code</a>
                </form>
            </div>
        </div>
    </section>
    <!-- number section end -->
