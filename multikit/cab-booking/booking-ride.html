<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&family=Rubik:wght@300;400;500;600;700;800;900&display=swap">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- Map link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/leaflet.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="roboto-body cab-booking-color">

    <!-- map section start -->
    <div class="map-section">
        <div id="map"></div>
    </div>
    <!-- map section end -->

    <!-- Booking ride section start -->
    <section class="booking-ride-section">
        <div class="custom-container">
            <div class="cab-drive-box">
                <a href="driver-details.html" class="driver-image">
                    <img src="../assets/images/cab-booking/driver.jpg" class="img-fluid" alt="">
                </a>
                <div class="driver-name">
                    <a href="driver-details.html" class="name-box">
                        <h5>Michael Cameron</h5>
                        <h6>Temp.: 98.6 F</h6>
                    </a>
                    <ul class="driver-contact">
                        <li>
                            <a href="#!">
                                <i class="ri-mail-line"></i>
                            </a>
                        </li>
                        <li>
                            <a href="#!">
                                <i class="ri-phone-line"></i>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
            <div class="cab-pay-box">
                <div class="cab-name">
                    <div class="cab-image">
                        <img src="../assets/images/cab-booking/cab/1.png" class="img-fluid cab-img" alt="">
                        <img src="../assets/images/cab-booking/cab/shape.svg" class="shape-image" alt="">
                    </div>
                    <div class="car-name">
                        <h3>Mini</h3>
                        <h4>Total Amount: $15</h4>
                    </div>
                </div>

                <ul class="map-list">
                    <li>
                        <i class="ri-map-2-line"></i>
                        <h5>2.5 KM</h5>
                    </li>
                    <li>
                        <i class="ri-time-line"></i>
                        <h5>Approx: 20 min</h5>
                    </li>
                </ul>

                <div class="button-group">
                    <a href="cancel-ride.html" class="btn cancel-button">Cancel Ride</a>
                    <button class="btn reschedule-button">Reschedule</button>
                </div>
            </div>
        </div>
    </section>
    <!-- Booking ride section end -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Map js -->
    <script src="../assets/js/leaflet.js"></script>
    <script src="../assets/js/custom-map.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
