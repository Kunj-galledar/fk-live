<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="multikit">
    <meta name="keywords" content="multikit">
    <meta name="author" content="multikit">
    <link rel="icon" href="../assets/images/favicon/6.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="nft-color">

    <!-- Author Image Box Start -->
    <section class="nft-authentication">
        <div class="custom-container">
            <div class="author-image">
                <img src="../assets/images/nft/author.png" class="img-fluid" alt="">
            </div>

            <div class="author-title">
                <h3>Verification</h3>
                <p>An 6 digit code has been sent to pa*****@gmail.com</p>
            </div>

            <form class="form-box-11">
                <div class="form-floating form-box">
                    <input type="number" class="form-control" id="floatingInput" placeholder="xyz@email.com">
                    <label for="floatingInput">Verification code</label>
                    <i class="ri-mail-line"></i>
                </div>
                <a href="index.html" class="nft-btn dark-btn text-center mt-3">Proceed</a>
                <div class="resend-box">
                    <h6>Resend code in</h6>
                    <div class="time" id="timer" data-minutes="1" data-seconds="2">
                        <ul>
                            <li>
                                <div class="counter">
                                    <div class="minutes content-color">02</div>
                                </div>
                            </li>
                            <span>:</span>
                            <li>
                                <div class="counter">
                                    <div class="seconds content-color">53</div>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
            </form>
        </div>
    </section>
    <!-- Author Image Box End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- timer js -->
    <script src="../assets/js/timer1.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
