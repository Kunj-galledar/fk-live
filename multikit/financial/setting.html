<!DOCTYPE html>
<html lang="en">

<body class="financial-color inter-body dark-body">

    <!-- Header Section Start -->
    <header class="financial-profile-header financial-small-header">
        <div class="custom-container">
            <div class="header-box">
                <a href="index.html" class="arrow-box title-color">
                    <i class="ri-arrow-left-line lh-1"></i>
                </a>
                <a href="index.html" class="header-profile">
                    <div class="name-content">
                        <h5 class="mb-0">Setting</h5>
                    </div>
                </a>
            </div>
        </div>
    </header>
    <!-- Header Section End -->

    <!-- App Setting Section Start -->
    <section class="section-t-space-2">
        <div class="custom-container">
            <ul class="app-setting-list">
                <li>
                    <div class="form-check form-switch app-setting-box">
                        <label class="form-check-label" for="flexSwitchCheckDefault">Remember me</label>
                        <input class="form-check-input" checked type="checkbox" role="switch"
                            id="flexSwitchCheckDefault">
                    </div>
                </li>

                <li>
                    <div class="form-check form-switch app-setting-box">
                        <label class="form-check-label" for="flexSwitchCheckDefault">Biometric ID</label>

                            id="flexSwitchCheckDefault">
                    </div>
                </li>

                <li>
                    <div class="form-check form-switch app-setting-box">
                        <label class="form-check-label" for="flexSwitchCheckDefault">Face ID</label>
                        <input class="form-check-input" checked type="checkbox" role="switch"
                            id="flexSwitchCheckDefault">
                    </div>
                </li>

                <li>
                    <div class="form-check form-switch app-setting-box">
                        <label class="form-check-label" for="flexSwitchCheckDefault">Finger Print</label>
                        <input class="form-check-input" checked type="checkbox" role="switch"
                            id="flexSwitchCheckDefault">
                    </div>
                </li>
            </ul>
        </div>
    </section>
    <!-- App Setting Section End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>
