<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/4.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@100;200;300;400;500;600;700;800;900&display=swap">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="financial-color inter-body dark-body">

    <!-- authentication start -->
    <div class="financial-authentication">
        <div class="custom-container w-100">
            <div class="logo-content">
                <img src="../assets/images/favicon/4.svg" class="img-fluid logo" alt="">
                <h2>Add Card</h2>
                <h5>Enter Bank Details to proceed</h5>
            </div>
            <form class="form-style-8">
                <div class="form-group-box">
                    <div class="form-box one-form">
                        <input type="number" class="form-control" placeholder="Enter OTP">
                    </div>
                </div>
                <a href="index.html" class="financial-btn theme-maroon-btn mt-4">Continue</a>
                <div class="resend-box resend-box-2">
                    <h6>Resend code in</h6>
                    <div class="time" id="timer" data-minutes="1" data-seconds="2">
                        <ul>
                            <li>
                                <div class="counter">
                                    <div class="minutes">
                                        <h6></h6>
                                    </div>
                                </div>
                            </li>
                            <li>:</li>
                            <li>
                                <div class="counter">
                                    <div class="seconds">
                                        <h6></h6>
                                    </div>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <!-- authentication end -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- timer js -->
    <script src="../assets/js/timer1.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
