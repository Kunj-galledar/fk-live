<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/4.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@100;200;300;400;500;600;700;800;900&display=swap">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- Swiper css -->
    <link rel="stylesheet" type="text/css" href="../assets/css/swiper-bundle.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="financial-color inter-body dark-body">

    <!-- Scan To Pay button Start -->
    <div class="scanner-header">
        <a href="index.html" class="close-icon">
            <i class="ri-close-line"></i>
        </a>
        <div class="right-box">
            <button class="camera financial-btn " id="switchCamera">
                <i class="ri-camera-switch-line"></i>
            </button>
            <button class="flash-light switch">
                <i class="ri-flashlight-fill"></i>
            </button>
        </div>
    </div>
    <!-- Scan To Pay button End -->

    <!-- QR Code Scan box Start -->
    <div class="qr-code-scan-box">
        <div style="width:100%" class="camera-box">
            <video id="cam" autoplay muted playsinline>Not available</video>
            <canvas id="canvas" style="display:none"></canvas>
            <img id="photo" alt="The screen capture will appear in this box.">
        </div>
        <svg>
            <use xlink:href="../assets/images/financial/qr-box.svg#qr-box"></use>
        </svg>
    </div>
    <!-- QR Code Scan box End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Open camera Js -->
    <script src="../assets/js/open-camera.js"></script>

    <!-- Flash Light On Js -->
    <script src="../assets/js/flashlight-on.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
