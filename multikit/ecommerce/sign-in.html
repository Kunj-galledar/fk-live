<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/2.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Multikit - Multi-purpose Html Template</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="ecommerce-color ecommarce-bg-color">

    <!-- authentication start -->
    <div class="ecommerce-auth d-block">
        <div class="custom-container w-100">
            <h1 class="top-title">Welcome</h1>
            <h2>Login to Multikit</h2>
            <form class="form-style-6">
                <div>
                    <label for="mail" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="mail" placeholder="Enter your email here">
                </div>
                <div>
                    <label for="pass" class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="Enter your password" id="pass">
                </div>
                <a href="forgot-password.html" class="theme-color text-end d-block">Forgot password?</a>
                <a href="index.html" class="btn ecommerce-btn btn-white mt-3">Login</a>

                <div class="auth-divider">
                    <span>Or</span>
                </div>
            </form>

            <ul class="social-style-4">
                <li>
                    <a href="https://www.facebook.com/" target="_blank">
                        <img src="../assets/images/cab-booking/social/fb.svg" alt="">
                        <h4>Continue with Facebook</h4>
                    </a>
                </li>
                <li>
                    <a href="https://www.google.com/" target="_blank">
                        <img src="../assets/images/cab-booking/social/google.svg" alt="">
                        <h4>Continue with Google</h4>
                    </a>
                </li>

                <li class="auth-permission">
                    <h4>
                        <a href="sign-up.html">I don't have an Account</a>
                    </h4>
                </li>
            </ul>
        </div>
    </div>
    <!-- authentication end -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
