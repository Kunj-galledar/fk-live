<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="multikit">
    <meta name="keywords" content="multikit">
    <title>Multikit - Multi-purpose Html Template</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#ff8d2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="multikit">
    <meta name="msapplication-TileImage" content="assets/images/favicon/1.svg">
    <meta name="msapplication-TileColor" content="#FFFFFF">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="icon" href="../assets/images/favicon/2.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.rtl.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="ecommerce-color ecommerce-bg-color">

    <!-- authentication start -->
    <div class="ecommerce-auth">
        <div class="custom-container">
            <h1 class="top-title">OTP</h1>
            <h2 class="email-title">You've got mail</h2>
            <p class="para">Please enter your account email address. We will send an OTP code for varification in the
                next step.</p>
            <form class="form-style-6">
                <div class="auth-flex">
                    <input type="number" class="form-control text-center" placeholder="0" maxlength="1" id="four1"
                        onkeyup="onKeyUpEvent(1, event)" onfocus="onFocusEvent(1)">
                    <input type="number" class="form-control text-center" placeholder="0" maxlength="1" id="four2"
                        onkeyup="onKeyUpEvent(2, event)" onfocus="onFocusEvent(2)">
                    <input type="number" class="form-control text-center" placeholder="0" maxlength="1" id="four3"
                        onkeyup="onKeyUpEvent(3, event)" onfocus="onFocusEvent(3)">
                    <input type="number" class="form-control text-center" placeholder="0" maxlength="1" id="four4"
                        onkeyup="onKeyUpEvent(4, event)" onfocus="onFocusEvent(4)">
                </div>
                <a href="sign-in.html" class="btn ecommerce-btn btn-white mt-3">Confirm</a>
            </form>
        </div>
    </div>
    <!-- authentication end -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Otp js -->
    <script src="../assets/js/otp-4.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
