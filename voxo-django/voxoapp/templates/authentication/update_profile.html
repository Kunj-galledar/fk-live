{% load static %}
{% load sass_tags %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Voxo">
    <meta name="keywords" content="Voxo">
    <meta name="author" content="Voxo">
    <link rel="icon" href="  {% static 'assets/images/favicon/2.png' %}" type="image/x-icon" />
    <title>Edit Details</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- bootstrap css -->
    <link id="rtl-link" rel="stylesheet" type="text/css" href="{% sass_src 'assets/scss/vendors/bootstrap.scss' %}">

    <!-- font-awesome css -->
    <link rel="stylesheet" type="text/css" href="{% sass_src 'assets/scss/vendors/font-awesome.scss' %}">

    <!-- feather icon css -->
    <link rel="stylesheet" type="text/css" href="{% sass_src 'assets/scss/vendors/feather-icon.scss' %}">

    <!-- animation css -->
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/animate.css' %}">

    <!-- slick css -->
    <link rel="stylesheet" type="text/css" href="{% sass_src 'assets/scss/vendors/slick/slick.scss' %}">
    <link rel="stylesheet" type="text/css" href="{% sass_src 'assets/scss/vendors/slick/slick-theme.scss' %}">

    <!-- Theme css -->
    <link id="color-link" rel="stylesheet" type="text/css" href="{% sass_src 'assets/scss/demo2.scss' %}">

</head>

<body class="theme-color2 light ltr">


    <!-- Add Address Modal Start -->

    <div class="modal fade add-address-modal" id="addAddress">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formEdit" action="{% url 'update_profile' %}" method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="name" class="form-label font-light">First Name</label>
                            <input type="text" class="form-control" value="{{lastDetails.customerFirstName}}"
                                name="first_name" id="firstnameId" required>
                        </div>

                        <div class="mb-3">
                            <label for="name" class="form-label font-light">Last Name</label>
                            <input type="text" class="form-control" value="{{lastDetails.customerLastName}}"
                                name="last_name" id="lastnameId" required>
                        </div>

                        <div class="mb-3">
                            <label for="name" class="form-label font-light">Username</label>
                            <input type="text" class="form-control" value="{{lastDetails.customerUsername}}"
                                name="username" id="usernameId" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label font-light">Email Address</label>
                            <input type="email" class="form-control" value="{{lastDetails.customerEmail}}" name="email"
                                id="emailId" required>
                        </div>

                        <div class="mb-3">
                            <label for="number" class="form-label font-light">Mobile No</label>
                            <input type="number" class="form-control" value="{{lastDetails.customerMobile}}"
                                name="mobno" id="mobnoId" required> </div>

                        <div class="mb-3">
                            <label for="text" class="form-label font-light">Address-1</label>
                            <input type="text" class="form-control" value="{{lastDetails.customerAddress1}}"
                                name="address1" id="address1Id" required>
                        </div>

                        <div class="mb-3">
                            <label for="text" class="form-label font-light">Address-2</label>
                            <input type="text" class="form-control" value="{{lastDetails.customerAddress2}}"
                                name="address2" id="address2Id" required>
                        </div>

                        <div class="mb-3">
                            <label for="text" class="form-label font-light">Country</label>
                            <input type="text" class="form-control" value="{{lastDetails.customerCountry}}"
                                name="country" id="countryId" required>
                        </div>

                        <div class="mb-3">
                            <label for="text" class="form-label font-light">City</label>
                            <input type="text" class="form-control" value="{{lastDetails.customerCity}}" name="city"
                                id="cityId" required>
                        </div>

                        <div class="mb-3">
                            <label for="number" class="form-label font-light">Zipcode</label>
                            <input type="number" class="form-control" value="{{lastDetails.customerZip}}" name="zipcode"
                                id="zipcodeId" required>
                        </div>


                        <div class="modal-footer pt-0 text-end d-block">
                            <button type="button" class="btn bg-secondary text-white rounded-1 modal-close-button"
                                data-bs-dismiss="modal">Close</button>
                            <button class="btn btn-solid-default rounded-1">Save Address</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Add Address Modal End -->
    <!-- Sign Up Section End -->

    <!-- theme Setting Start -->
    <div class="theme-setting">
        <ul>
            <li>
                <button id="darkButton" class="btn btn-sm dark-buttton">Dark</button>
            </li>
            <li>
                <button class="btn btn-sm rtl-button">RTL</button>
            </li>
            <li class="color-picker">
                <input type="color" class="form-control form-control-color" id="ColorPicker1" value="#e22454"
                    title="Choose your color">
            </li>
        </ul>
    </div>
    <!-- theme Setting End -->

    <div class="bg-overlay"></div>

    <!-- latest jquery-->
    <script src="{% static 'assets/js/jquery-3.5.1.min.js' %}"></script>

    <!-- Bootstrap js-->
    <script src="{% static 'assets/js/bootstrap/bootstrap.bundle.min.js' %}"></script>

    <!-- feather icon js-->
    <script src="{% static 'assets/js/feather/feather.min.js' %}"></script>

    <!-- Slick js-->
    <script src="{% static 'assets/js/slick/slick.js' %}"></script>
    <script src="{% static 'assets/js/slick/slick-animation.min.js' %}"></script>
    <script src="{% static 'assets/js/slick/custom_slick.js' %}"></script>

    <!-- Notify js-->
    <script src="{% static 'assets/js/bootstrap/bootstrap-notify.min.js' %}"></script>

    <!-- script js -->
    <script src="{% static 'assets/js/theme-setting.js' %}"></script>
    <script src="{% static 'assets/js/script.js' %}"></script>
    <script src="{% static 'assets/js/home-script.js' %}"></script>

</body>

</html>
