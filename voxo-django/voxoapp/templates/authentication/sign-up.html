{% load static %}
{% load sass_tags %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Voxo">
    <meta name="keywords" content="Voxo">
    <meta name="author" content="Voxo">
    <link rel="icon" href="  {% static 'assets/images/favicon/2.png' %}" type="image/x-icon" />
    <title>Sign Up</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- bootstrap css -->
    <link id="rtl-link" rel="stylesheet" type="text/css" href="{% sass_src 'assets/scss/vendors/bootstrap.scss' %}">

    <!-- font-awesome css -->
    <link rel="stylesheet" type="text/css" href="{% sass_src 'assets/scss/vendors/font-awesome.scss' %}">

    <!-- feather icon css -->
    <link rel="stylesheet" type="text/css" href="{% sass_src 'assets/scss/vendors/feather-icon.scss' %}">

    <!-- animation css -->
    <link rel="stylesheet" type="text/css" href="{% static 'assets/css/vendors/animate.min.css' %}">

    <!-- slick css -->
    <link rel="stylesheet" type="text/css" href="{% sass_src 'assets/scss/vendors/slick/slick.scss' %}">
    <link rel="stylesheet" type="text/css" href="{% sass_src 'assets/scss/vendors/slick/slick-theme.scss' %}">

    <!-- Theme css -->
    <link id="color-link" rel="stylesheet" type="text/css" href="{% sass_src 'assets/scss/demo2.scss' %}">

    <style>
        .required-field::before {
            content: "*";
            color: red;
        }
    </style>

</head>

<body class="signup-page theme-color2">

<!-- Loader div Start -->
<div class='loader-wrapper' id="loaderWrapper">
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>
</div>
<!-- Loader div End -->

    <!-- Sign Up Section Start -->
    <div class="login-section">
        <div class="materialContainer">
            <div class="box">
                {% include 'includes/alerts.html' %}
                <div class="login-title">
                    <h2>Register</h2>
                </div>
                <form method='post' action="{% url 'signup_page' %}">
                    {% csrf_token %}
                    <div class="input">
                        <!-- <label for="floatingSelect">Select Role <span class="required-field"></span></label> -->
                        <select class="form-select" name="role" required id="floatingSelect">
                            <option selected value="">Select Role</option>
                            <option value="customer">Customer</option>
                            <option value="vendor">Vendor</option>
                        </select>
                        <!-- <label for="floatingSelect">Works with selects</label> -->
                        <span class="spin"></span>
                    </div>

                    <div class="input">
                        <label for="name">Name <span class="required-field"></span></label>
                        <input type="text" name="username" id="name" required>
                        <span class="spin"></span>
                    </div>

                    <div class="input">
                        <label for="emailname">Email Address <span class="required-field"></span></label>
                        <input type="text" name="email" id="emailname" required>
                        <span class="spin"></span>
                    </div>

                    <div class="input">
                        <label for="pass">Password <span class="required-field"></span></label>
                        <input type="password" name="pass" id="pass" required>
                        <span class="spin"></span>
                    </div>

                    <div class="input">
                        <label for="compass">Confirm Password <span class="required-field"></span></label>
                        <input type="password" name="cpass" id="compass" required>
                        <span class="spin"></span>
                    </div>

                    <div class="button login">
                        <button onclick="" type="submit" id="colorUsed">
                            <span>Sign Up</span>
                            <i class="fa fa-check"></i>
                        </button>
                    </div>
                </form>
                <p class="sign-category">
                    <span>Or sign up with</span>
                </p>

                <div class="row gx-md-3 gy-3">
                    <div class="col-md-6">
                        <a href="javascript:void(0)">
                            <div class="social-media fb-media">
                                <img loading="lazy" src="{% static 'assets/images/inner-page/facebook.png' %}"
                                    class="img-fluid blur-up lazyload" alt="">
                                <h6>Facebook</h6>
                            </div>
                        </a>
                    </div>
                    <div class="col-md-6">
                        <a href="javascript:void(0)">
                            <div class="social-media google-media">
                                <img loading="lazy" src="{% static 'assets/images/inner-page/google.png' %}"
                                    class="img-fluid blur-up lazyload" alt="">
                                <h6>Google</h6>
                            </div>
                        </a>
                    </div>
                </div>
                <p><a href="{% url 'login_page' %}" class="theme-color">Already have an account?</a></p>
            </div>
        </div>
    </div>
    <!-- Sign Up Section End -->

    <div class="bg-overlay"></div>

    <!-- theme Setting Start -->
    <div class="theme-setting">
        <ul>
            <li>
                <button id="darkButton" class="btn btn-sm dark-buttton">Dark</button>
            </li>
            <li>
                <button class="btn btn-sm rtl-button">RTL</button>
            </li>
            <li class="color-picker">
                <input type="color" class="form-control form-control-color" id="ColorPicker1" value="#e22454"
                    title="Choose your color">
            </li>
        </ul>
    </div>
    <!-- theme Setting End -->

    <!-- latest jquery-->
    <script src="{% static 'assets/js/jquery-3.5.1.min.js' %}"></script>

    <!-- Bootstrap js-->
    <script src="{% static 'assets/js/bootstrap/bootstrap.bundle.min.js' %}"></script>

    <!-- lazyload js-->
    <script src="{% static 'assets/js/lazysizes.min.js' %}"></script>

    <!-- feather icon js-->
    <script src="{% static 'assets/js/feather/feather.min.js' %}"></script>

    <!-- Slick js-->
    <script src="{% static 'assets/js/slick/slick.js' %}"></script>
    <script src="{% static 'assets/js/slick/slick-animation.min.js' %}"></script>
    <script src="{% static 'assets/js/slick/custom_slick.js' %}"></script>

    <!-- Notify js-->
    <script src="{% static 'assets/js/bootstrap/bootstrap-notify.min.js' %}"></script>

    <!-- script js -->
    <script src="{% static 'assets/js/theme-setting.js' %}"></script>
    <script src="{% static 'assets/js/script.js' %}"></script>
    <script src="{% static 'assets/js/home-script.js' %}"></script>

</body>

</html>
