<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Megakit - Multi-purpose Html Template</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700;900&family=Rubik:wght@300;400;500;600;700;800;900&display=swap">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- swiper link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/swiper-bundle.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="roboto-body cab-booking-color">

    <!-- number section start -->
    <section class="number-section">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="number-title">
                        <h2>Verify Number</h2>
                        <h4>We have send the code verification to your mobile number</h4>
                        <form>
                            <div class="mb-2 cab-form-control cab-form-control-bg">
                                <img src="../assets/images/cab-booking/flag/1.jpg" alt="">
                                <input type="number" class="form-control" id="password" placeholder="987-654-321"
                                    disabled>
                                <a href="enter-number.html">
                                    <i class="ri-edit-box-line"></i>
                                </a>
                            </div>

                            <div class="cab-form-control cab-form-control-flex">
                                <div class="form-group">
                                    <input type="number" class="form-control text-center" placeholder="0" max="1">
                                    <input type="number" class="form-control text-center" placeholder="0" max="1">
                                    <input type="number" class="form-control text-center" placeholder="0" max="1">
                                    <input type="number" class="form-control text-center" placeholder="0" max="1">
                                    <input type="number" class="form-control text-center" placeholder="0" max="1">
                                    <input type="number" class="form-control text-center" placeholder="0" max="1">
                                </div>
                            </div>
                            <a href="gps-turned-off.html"
                                class="cab-button cab-button-gradient d-block text-center w-100 mt-4">Submit</a>
                            <a href="javascript:void(0)"
                                class="cab-button cab-button-border d-block text-center w-100 mt-4">Resend</a>
                        </form>

                        <div class="resend-box">
                            <h6>Resend code in</h6>
                            <div class="time" id="timer" data-minutes="1" data-seconds="2">
                                <ul>
                                    <li>
                                        <div class="counter">
                                            <div class="minutes">
                                                <h6></h6>
                                            </div>
                                        </div>
                                    </li>
                                    <span>:</span>
                                    <li>
                                        <div class="counter">
                                            <div class="seconds">
                                                <h6></h6>
                                            </div>
                                        </div>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- number section end -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- otp js -->
    <script src="../assets/js/otp.js"></script>

    <!-- timer js -->
    <script src="../assets/js/timer1.js"></script>

    <!-- swiper js -->
    <script src="../assets/js/swiper-bundle.min.js"></script>
    <script src="../assets/js/custom_swiper.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
