<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Megakit - Multi-purpose Html Template</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;300;400;700;900&display=swap" rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="lato-body food-color food-auth-bg">

    <!-- authentication start -->
    <section class="food-auth food-auth-bg">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <button class="head-arrow btn">
                        <i class="ri-arrow-left-line"></i>
                    </button>

                    <div class="auth-title text-center mb-5">
                        <h3>Verify Phone Number</h3>
                        <h4>We have just send a code to ******8541</h4>
                    </div>

                    <form action="" class="form-style-4 mb-4">
                        <div class="form-flex">
                            <input type="number" class="form-control text-center" placeholder="0" maxlength="1"
                                id="five1" onkeyup="onKeyUpEvent(1, event)" onfocus="onFocusEvent(1)">
                            <input type="number" class="form-control text-center" placeholder="0" maxlength="1"
                                id="five2" onkeyup="onKeyUpEvent(2, event)" onfocus="onFocusEvent(2)">
                            <input type="number" class="form-control text-center" placeholder="0" maxlength="1"
                                id="five3" onkeyup="onKeyUpEvent(3, event)" onfocus="onFocusEvent(3)">
                            <input type="number" class="form-control text-center" placeholder="0" maxlength="1"
                                id="five4" onkeyup="onKeyUpEvent(4, event)" onfocus="onFocusEvent(4)">
                            <input type="number" class="form-control text-center" placeholder="0" maxlength="1"
                                id="five5" onkeyup="onKeyUpEvent(5, event)" onfocus="onFocusEvent(5)">
                        </div>
                    </form>

                    <span class="text-center d-block content-color">Having problem? <a href="javascript:void(0)"
                            class="primary-color">Resend Again</a></span>

                    <button onclick="location.href = 'location.html';" class="btn btn-food-btn mt-200">Continue</button>
                </div>
            </div>
        </div>
    </section>
    <!-- authentication end -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- opt js -->
    <script src="../assets/js/otp.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
