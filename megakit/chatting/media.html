<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Megakit - Multi-purpose Html Template</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="rubik-body theme-bg-color chatting-color">

    <!-- Header Section Start -->
    <header class="chatting-header">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="header-box">
                        <div class="left-header">
                            <img src="../assets/images/logo/2.svg" class="img-fluid w-100" alt="">
                        </div>
                        <div class="right-header">
                            <button class="search-button btn">
                                <i class="ri-search-line"></i>
                            </button>
                            <button class="btn menu-button">
                                <i class="ri-more-2-line"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- Header Section End -->

    <!-- Media Section Start -->
    <section class="media-section">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <ul class="nav nav-pills media-nav-pills" id="pills-tab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="pills-media-tab" data-bs-toggle="pill"
                                data-bs-target="#pills-media" type="button" role="tab">Media</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="pills-docs-tab" data-bs-toggle="pill"
                                data-bs-target="#pills-docs" type="button" role="tab">Docs</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="pills-links-tab" data-bs-toggle="pill"
                                data-bs-target="#pills-links" type="button" role="tab">Links</button>
                        </li>
                    </ul>
                    <div class="tab-content media-content" id="pills-tabContent">
                        <div class="tab-pane fade show active" id="pills-media" role="tabpanel">
                            <div class="media-image-box">
                                <div class="title">
                                    <h4>Today</h4>
                                </div>
                                <div class="media-image">
                                    <img src="../assets/images/chatting/media/pic/1.jpg" class="img-fluid" alt="">
                                    <img src="../assets/images/chatting/media/pic/2.jpg" class="img-fluid" alt="">
                                    <img src="../assets/images/chatting/media/pic/3.jpg" class="img-fluid" alt="">
                                </div>
                            </div>

                            <div class="media-image-box mt-3">
                                <div class="title">
                                    <h4>Yesterday</h4>
                                </div>
                                <div class="media-image">
                                    <img src="../assets/images/chatting/media/pic/4.jpg" class="img-fluid" alt="">
                                    <img src="../assets/images/chatting/media/pic/5.jpg" class="img-fluid" alt="">
                                    <img src="../assets/images/chatting/media/pic/6.jpg" class="img-fluid" alt="">
                                    <img src="../assets/images/chatting/media/pic/7.jpg" class="img-fluid" alt="">
                                </div>
                            </div>

                            <div class="media-image-box mt-3">
                                <div class="title">
                                    <h4>29/11/2022</h4>
                                </div>
                                <div class="media-image">
                                    <img src="../assets/images/chatting/media/pic/4.jpg" class="img-fluid" alt="">
                                    <img src="../assets/images/chatting/media/pic/5.jpg" class="img-fluid" alt="">
                                    <img src="../assets/images/chatting/media/pic/6.jpg" class="img-fluid" alt="">
                                    <img src="../assets/images/chatting/media/pic/7.jpg" class="img-fluid" alt="">
                                    <img src="../assets/images/chatting/media/pic/8.jpg" class="img-fluid" alt="">
                                    <img src="../assets/images/chatting/media/pic/9.jpg" class="img-fluid" alt="">
                                    <img src="../assets/images/chatting/media/pic/10.jpg" class="img-fluid" alt="">
                                    <img src="../assets/images/chatting/media/pic/11.jpg" class="img-fluid" alt="">
                                </div>
                            </div>
                        </div>

                        <div class="tab-pane fade" id="pills-docs" role="tabpanel">
                            <div class="media-docs-box">

                            </div>
                        </div>
                        <div class="tab-pane fade" id="pills-links" role="tabpanel">...</div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- Media Section End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
