<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Megakit - Multi-purpose Html Template</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="rubik-body theme-bg-color chatting-color">

    <!-- Header Section Start -->
    <header class="chatting-header">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="header-box">
                        <div class="arrow-box">
                            <i class="ri-arrow-left-s-line"></i>
                        </div>
                        <div class="header-profile">
                            <div class="profile-image">
                                <img src="../assets/images/chatting/profile/1.jpg" class="img-fluid" alt="">
                            </div>
                            <div class="name-contect">
                                <h5>Michael Anderson</h5>
                                <h6>+91 58784 58125</h6>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- Header Section End -->

    <!-- Mobile Section Start -->
    <div class="chatting-mobile-section">
        <ul class="mobile-list">
            <li>
                <a href="calls.html">
                    <i class="ri-phone-line unactive-icon"></i>
                    <i class="ri-phone-fill active-icon"></i>
                    <h5>Calls</h5>
                </a>
            </li>

            <li>
                <a href="index.html">
                    <i class="ri-chat-3-line unactive-icon"></i>
                    <i class="ri-chat-3-fill active-icon"></i>
                    <h5>Messages</h5>
                </a>
            </li>

            <li class="active">
                <a href="setting.html">
                    <i class="ri-user-3-line unactive-icon"></i>
                    <i class="ri-user-3-fill active-icon"></i>
                    <h5>Profile</h5>
                </a>
            </li>
        </ul>
    </div>
    <!-- Mobile Section End -->

    <!-- Account Setting Section Start -->
    <section class="account-setting-section">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="account-setting-list-box">
                        <ul class="account-setting-list">
                            <li>
                                <a href="account.html" class="setting-name">
                                    <i class="ri-user-3-line"></i>
                                    <h4>Account</h4>
                                </a>
                            </li>

                            <li>
                                <a href="javascript:void(0)" class="setting-name">
                                    <i class="ri-chat-3-line"></i>
                                    <h4>Chats</h4>
                                </a>
                            </li>

                            <li>
                                <a href="javascript:void(0)" class="setting-name">
                                    <i class="ri-notification-2-line"></i>
                                    <h4>Notification</h4>
                                </a>
                            </li>

                            <li>
                                <a href="javascript:void(0)" class="setting-name">
                                    <i class="ri-question-line"></i>
                                    <h4>Help</h4>
                                </a>
                            </li>

                            <li>
                                <a href="javascript:void(0)" class="setting-name">
                                    <i class="ri-restart-line"></i>
                                    <h4>Backup</h4>
                                </a>
                            </li>

                            <li>
                                <a href="javascript:void(0)" class="setting-name">
                                    <i class="ri-lock-2-line"></i>
                                    <h4>Privacy</h4>
                                </a>
                            </li>

                            <li>
                                <a href="javascript:void(0)" class="setting-name">
                                    <i class="ri-user-add-line"></i>
                                    <h4>Invite a Friend</h4>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- Account Setting Section End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
