<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Megakit - Multi-purpose Html Template</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="chatting-onboarding-bg rubik-body chatting-color">

    <!-- authentication Section Start -->
    <section class="chatting-auth">
        <div class="chatting-header">
            <img src="../assets/images/chatting/chatting-bg.png" class="img-fluid w-100" alt="">
            <div class="background-bg"></div>
        </div>
        <div class="chatting-content">
            <div class="custom-container">
                <h2>Enter your Mobile number</h2>
                <h4>Chat, get to know each other and do face to face. Enjoy Safe, secure messaging.</h4>
            </div>
        </div>
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <form class="form-style-2 mb-3">
                        <div class="row g-2">
                            <div class="col-4">
                                <div class="custom-form-select">
                                    <label for="exampleFormControlInput1" class="form-label">Email address</label>
                                    <select class="form-select" aria-label="Default select example">
                                        <option selected>+91 (IN)</option>
                                        <option value="AF">+93 (AF)</option>
                                        <option value="AD">+376 (AD)</option>
                                        <option value="BEN">+229 (BEN)</option>
                                        <option value="BTN">+975 (BTN)</option>
                                        <option value="CMR">+237 (CMR)</option>
                                        <option value="TCD">+235 (TCD)</option>
                                        <option value="CXR">+61 (CXR)</option>
                                        <option value="COM">+269 (COM)</option>
                                        <option value="CRI">+683 (CRI)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-8">
                                <div class="chatting-form-control">
                                    <label for="exampleFormControlInput1" class="form-label">Email address</label>
                                    <input type="number" class="form-control" id="exampleFormControlInput1"
                                        placeholder="989-695-2258">
                                </div>
                            </div>
                        </div>
                    </form>
                    <button onclick="location.href = 'index.html';"
                        class="btn btn-white title-color rounded-pill">Continue</button>
                </div>
            </div>
        </div>
    </section>
    <!-- authentication Section End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
