<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../" type="image/x-icon" />
    <title>Megakit - Multi-purpose Html Template</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="chatting-onboarding-bg rubik-body chatting-color">

    <div class="onboarding-top">
        <img src="../assets/images/chatting/chatting-bg.png" class="img-fluid w-100" alt="">
        <div class="background-bg"></div>
    </div>

    <div class="chatting-log-in">
        <div class="custom-container">
            <h2>Verify Mobile Number</h2>
            <h4>An 4 digit code has been sent to +91 989-695-2258</h4>
        </div>
    </div>

    <div class="otp-section">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <form>
                        <div class="chatting-form-control mb-3 otp-box">
                            <input type="number" class="form-control text-center" id="1" placeholder="0"
                                onkeyup='tabChange(1)' maxlength=1>
                            <input type="number" class="form-control text-center" id="2" placeholder="0"
                                onkeyup='tabChange(2)' maxlength=1>
                            <input type="number" class="form-control text-center" id="3" placeholder="0"
                                onkeyup='tabChange(3)' maxlength=1>
                            <input type="number" class="form-control text-center" id="4" placeholder="0"
                                onkeyup='tabChange(4)' maxlength=1>
                        </div>
                        <a href="index.html" class="btn btn-white title-color rounded-pill">Verify and Login</a>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- opt js -->
    <script src="../assets/js/otp.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
