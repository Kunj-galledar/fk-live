    <!-- authentication Section Start -->
    <section class="chatting-auth">
        <div class="chatting-header">
            <img src="../assets/images/chatting/chatting-bg.png" class="img-fluid w-100" alt="">
            <div class="background-bg"></div>
        </div>

        <div class="chatting-content">
            <h2>Verify Mobile Number</h2>
            <h4>An 4 digit code has been sent to +91 989-695-2258</h4>
        </div>
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <form class="form-style-2">
                        <div class="chatting-form-control mb-3 from-flex">
                            <input type="number" class="form-control text-center" placeholder="0" maxlength="1"
                                id="form1" onkeyup="onKeyUpEvent(1, event)" onfocus="onFocusEvent(1)">
                            <input type="number" class="form-control text-center" placeholder="0" maxlength="1"
                                id="form2" onkeyup="onKeyUpEvent(2, event)" onfocus="onFocusEvent(2)">
                            <input type="number" class="form-control text-center" placeholder="0" maxlength="1"
                                id="form3" onkeyup="onKeyUpEvent(3, event)" onfocus="onFocusEvent(3)">
                            <input type="number" class="form-control text-center" placeholder="0" maxlength="1"
                                id="form4" onkeyup="onKeyUpEvent(4, event)" onfocus="onFocusEvent(4)">
                        </div>
                    </form>
                    <button class="btn btn-white title-color rounded-pill"
                        onclick="location.href = 'index.html';">Verify and Login</button>
                </div>
            </div>
        </div>
    </section>
    <!-- authentication Section End -->

    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>
