<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../../" type="image/x-icon" />
    <title>Megakit - Multi-purpose Html Template</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- Swiper css -->
    <link rel="stylesheet" href="../assets/css/swiper-bundle.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="inter-body theme-color-1">

    <!-- header start -->
    <header class="main-header learning-header h-102">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="top-header">
                        <div class="header-left">
                            <a class="text-white" data-bs-toggle="offcanvas" href="#sideMenu" role="button">
                                <i class="ri-arrow-left-line"></i>
                            </a>
                        </div>

                        <div class="header-right">
                            <div class="notification-box">
                                <a class="text-white" data-bs-toggle="offcanvas" href="#notification" role="button">
                                    <i class="ri-shopping-bag-3-line"></i>
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="header-bottom header-bottom-2">
                        <h2 class="fw-500 text-white">App Setting</h2>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- header end -->

    <!-- app setting seting start -->
    <section class="section-t-space app-seting-section">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <ul class="sidebar-menu">
                        <li>
                            <div class="menu-list">
                                <div class="list-icon">
                                    <i class="ri-moon-line"></i>
                                    <h4>Dark Mode</h4>
                                </div>
                                <div class="list-option">
                                    <div class="grid-item">
                                        <label class="switch">
                                            <input type="checkbox">
                                            <span class="slider round">
                                            </span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </li>

                        <li>
                            <div class="menu-list">
                                <div class="list-icon">
                                    <i class="ri-translate-2"></i>
                                    <h4>Dark Mode</h4>
                                </div>
                                <div class="list-option">
                                    <div class="grid-item">
                                        <label class="switch">
                                            <input type="checkbox">
                                            <span class="slider round">
                                            </span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </li>
                        <li>
                            <div class="menu-list">
                                <div class="list-icon">
                                    <i class="ri-settings-3-line"></i>
                                    <h4>Dark Mode</h4>
                                </div>
                                <div class="list-option">
                                    <div class="grid-item">
                                        <label class="switch">
                                            <input type="checkbox">
                                            <span class="slider round">
                                            </span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </section>
    <!-- app setting seting end -->

    <!-- space box start -->
    <div class="spacing-box"></div>
    <!-- space box End -->


    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- swiper js -->
    <script src="../assets/js/swiper-bundle.min.js"></script>
    <script src="../assets/js/custom_swiper.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
