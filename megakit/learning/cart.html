<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../../" type="image/x-icon" />
    <title>Megakit - Multi-purpose Html Template</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- Swiper css -->
    <link rel="stylesheet" href="../assets/css/swiper-bundle.min.css">

    <link rel="stylesheet" href="../assets/css/iconly.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="learning-body theme-color-1">

    <!-- header start -->
    <header class="main-header learning-header h-102">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="top-header">
                        <div class="header-left">
                            <a class="text-white" data-bs-toggle="offcanvas" href="#sideMenu" role="button">
                                <i class="ri-arrow-left-line"></i>
                            </a>
                        </div>

                        <div class="header-right">
                            <div class="notification-box">
                                <a class="text-white" data-bs-toggle="offcanvas" href="#notification" role="button">
                                    <i class="ri-shopping-bag-3-line"></i>
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="header-bottom header-bottom-2">
                        <h2 class="fw-500 text-white">Cart</h2>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- header end -->

    <!-- Popular Course Start -->
    <section class="section-t-space popular-course-section">
        <div class="custom-container">
            <div class="title">
                <h4>Order Summary:</h4>
            </div>
            <div class="row g-4">
                <div class="col-12">
                    <div class="popular-box-2">
                        <div class="popular-image">
                            <img src="../assets/images/learning/course/1.jpg" class="img-fluid w-100" alt="">
                        </div>
                        <div class="popular-detail">
                            <h6>Python Beyond the Basics - Object-Oriented Programming</h6>
                            <h5 class="title-color mt-1">$50.00 <del class="ms-1">$55.00</del></h5>
                            <button class="btn p-0 remove-button">
                                <i class="ri-close-line"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="col-12">
                    <div class="popular-box-2">
                        <div class="popular-image">
                            <img src="../assets/images/learning/course/2.jpg" class="img-fluid w-100" alt="">
                        </div>
                        <div class="popular-detail">
                            <h6>Python Beyond the Basics - Object-Oriented Programming</h6>
                            <h5 class="title-color mt-1">$50.00 <del class="ms-1">$55.00</del></h5>
                            <button class="btn p-0 remove-button">
                                <i class="ri-close-line"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- Popular Course End -->

    <!-- Divider Setting Start -->
    <section class="section-t-space section-b-space">
        <div class="divider"></div>
    </section>
    <!-- Divider Setting End -->

    <!-- Setting Section Start -->
    <div class="search-box">
        <div class="custom-container">
            <div class="title">
                <h4>Coupons:</h4>
            </div>
            <div class="row">
                <div class="col-12">
                    <form>
                        <div class="learning-theme-form learning-search-form">
                            <div class="search-icon">
                                <i class="iconly-Discount icli"></i>
                            </div>
                            <input type="search" class="form-control" placeholder="Search">
                            <button class="btn filter-button" type="button" data-bs-toggle="offcanvas"
                                data-bs-target="#filter-button">
                                <i class="ri-sound-module-line fil"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <!-- Setting Section End -->

    <!-- Filter Offcanvas Start -->
    <div class="offcanvas filter-button offcanvas-bottom" tabindex="-1" id="filter-button"
        aria-labelledby="offcanvasExampleLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasExampleLabel">Sort by: </h5>
        </div>
        <div class="offcanvas-body">
            <div class="filter-box-list">
                <ul class="filter-list">
                    <li>
                        <a href="javascript:void(0)" class="filter-box">
                            <div class="filter-icon">
                                <i class="ri-thumb-up-line"></i>
                            </div>
                            <div class="filter-name">
                                <h5>Popularity</h5>
                            </div>
                        </a>
                    </li>
                    <li>
                        <a href="javascript:void(0)" class="filter-box active">
                            <div class="check-box">
                                <i class="ri-check-line"></i>
                            </div>
                            <div class="filter-icon">
                                <svg>
                                    <use xlink:href="../assets/images/learning/low-high.svg#low"></use>
                                </svg>
                            </div>
                            <div class="filter-name">
                                <h5>Price: Low to High</h5>
                            </div>
                        </a>
                    </li>
                    <li>
                        <a href="javascript:void(0)" class="filter-box">
                            <div class="filter-icon">
                                <svg>
                                    <use xlink:href="../assets/images/learning/high-low.svg#high"></use>
                                </svg>
                            </div>
                            <div class="filter-name">
                                <h5>Price: High to Low</h5>
                            </div>
                        </a>
                    </li>
                    <li>
                        <a href="javascript:void(0)" class="filter-box">
                            <div class="filter-icon">
                                <i class="ri-star-line"></i>
                            </div>
                            <div class="filter-name">
                                <h5>User Ratings: Highest</h5>
                            </div>
                        </a>
                    </li>
                </ul>
                <button class="btn apply-button">Apply</button>
            </div>
        </div>
    </div>
    <!-- Filter Offcanvas End -->


    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- swiper js -->
    <script src="../assets/js/swiper-bundle.min.js"></script>
    <script src="../assets/js/custom_swiper.js"></script>

    <script src="../assets/js/iconly.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>
</body>

</html>
