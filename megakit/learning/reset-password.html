<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"

<body class="learning-body theme-color-1">

    <!-- Home Section start -->
    <section class="learning-home-section">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="home-contain">
                        <h2>Reset Password</h2>
                        <h5>The password should have atleast 6 characters</h5>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- Home Section end -->

    <!-- Log In Form Start -->
    <section class="learning-login-form mt-35">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <form>
                        <div class="learning-theme-form">
                            <label for="pass" class="form-label">New Password</label>
                            <input type="password" class="form-control" placeholder="New Password" id="pass">
                        </div>
                        <div class="learning-theme-form">
                            <label for="pass2" class="form-label">Confirm New Password</label>
                            <input type="password" class="form-control" placeholder="Confirm New Password" id="pass2">
                        </div>
                        <button onclick="location.href = 'learning/home.html';" class="btn mt-4">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
    <!-- Log In Form End -->

    <script src="../assets/js/script.js"></script>
