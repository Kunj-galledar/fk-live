<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="nesh">
    <meta name="keywords" content="nesh">
    <meta name="author" content="nesh">
    <link rel="icon" href="../assets/images/favicon/1.svg" type="image/x-icon" />
    <link rel="shortcut icon" href="../../" type="image/x-icon" />
    <title>Megakit - Multi-purpose Html Template</title>

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Bootstrap link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.min.css">

    <!-- Swiper css -->
    <link rel="stylesheet" href="../assets/css/swiper-bundle.min.css">

    <!-- Remix Icon link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/remixicon.css">

    <!-- Style Link -->
    <link rel="stylesheet" type="text/css" href="../assets/css/style.css">
</head>

<body class="inter-body theme-color-1">

    <!-- header start -->
    <header class="main-header learning-header h-102">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="top-header">
                        <div class="header-left">
                            <a class="text-white" data-bs-toggle="offcanvas" href="#sideMenu" role="button">
                                <i class="ri-arrow-left-line"></i>
                            </a>
                        </div>

                        <div class="header-right">
                            <div class="notification-box">
                                <a class="text-white" data-bs-toggle="offcanvas" href="#notification" role="button">
                                    <i class="ri-shopping-bag-3-line"></i>
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="header-bottom header-bottom-2">
                        <h2 class="fw-500 text-white">Edit Profile</h2>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <!-- header end -->

    <!-- Edit Profile Section Start -->
    <section class="section-t-space edit-profile-section">
        <div class="custom-container">
            <!-- <div class="title">
                <h4>Edit Profile</h4>
            </div> -->
            <div class="row">
                <div class="col-12">
                    <div class="edit-image">
                        <div class="profile-pic">
                            <label class="-label" for="file">
                                <span class="glyphicon glyphicon-camera"></span>
                                <span><i class="ri-pencil-fill"></i></span>
                            </label>
                            <input id="file" type="file" onchange="loadFile(event)" />
                            <img src="../assets/images/learning/menu-profile.jpg" id="output" alt="" />
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- Edit Profile Section End -->

    <!-- account name setion start -->
    <setion class="section-t-space account-name-section">
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <div class="acount-form-box">
                        <form>
                            <div class="learning-theme-form">
                                <label for="fname" class="form-label">First Name</label>
                                <input type="text" class="form-control" placeholder="First Name" id="fname">
                            </div>
                            <div class="learning-theme-form">
                                <label for="lname" class="form-label">Last Name</label>
                                <input type="text" class="form-control" placeholder="Last Name" id="lname">
                            </div>
                            <div class="learning-theme-form">
                                <label for="bio" class="form-label">Bio</label>
                                <textarea class="form-control" placeholder="Enter Your Bio" id="bio"
                                    rows="3"></textarea>
                            </div>
                            <div class="learning-theme-form">
                                <label for="bio" class="form-label">Language</label>
                                <select class="form-select" aria-label="Default select example">
                                    <option disabled selected>----- Select Language -----</option>
                                    <option value="1">English</option>
                                    <option value="2">Chinese</option>
                                    <option value="3">Hindi</option>
                                    <option value="4">Spanish</option>
                                    <option value="5">French</option>
                                    <option value="6">Arabic</option>
                                    <option value="7">Bangla</option>
                                    <option value="8">Russian</option>
                                    <option value="9">German</option>
                                    <option value="10">Tamil</option>
                                    <option value="11">Urdu</option>
                                    <option value="12">Gujarati</option>
                                </select>
                            </div>
                            <div class="learning-theme-form select-gender">
                                <label for="bio" class="form-label">Gender</label>
                                <ul class="gender-list">
                                    <li>
                                        <div class="form-check custome-radio-box custome-radio-box-2">
                                            <input class="form-check-input" type="radio" checked name="gender"
                                                id="male">
                                            <label class="form-check-label" for="male">Male</label>
                                        </div>
                                    </li>

                                    <li>
                                        <div class="form-check custome-radio-box custome-radio-box-2">
                                            <input class="form-check-input" type="radio" name="gender" id="female">
                                            <label class="form-check-label" for="female">Female</label>
                                        </div>
                                    </li>

                                    <li>
                                        <div class="form-check custome-radio-box custome-radio-box-2">
                                            <input class="form-check-input" type="radio" name="gender" id="other">
                                            <label class="form-check-label" for="other">Other</label>
                                        </div>
                                    </li>
                                </ul>
                            </div>
                            <button type="submit" class="btn btn-gradient mt-4">Save Setting</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </setion>
    <!-- account name setion end -->


    <!-- Bootstrap js-->
    <script src="../assets/js/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- swiper js -->
    <script src="../assets/js/swiper-bundle.min.js"></script>
    <script src="../assets/js/custom_swiper.js"></script>

    <!-- image change js -->
    <script src="../assets/js/image-change.js"></script>

    <!-- Theme js-->
    <script src="../assets/js/script.js"></script>

    <script>
        var loadFile = function (event) {
            var image = document.getElementById("output");
            image.src = URL.createObjectURL(event.target.files[0]);
        };
    </script>
</body>

</html>
