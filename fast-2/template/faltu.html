<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fastkart">
    <meta name="keywords" content="Fastkart">
    <meta name="author" content="Fastkart">
    <link rel="icon" href="../assets/images/favicon/1.png" type="image/x-icon">
    <title>Faltu</title>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Neucha&display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- bootstrap css -->
    <link id="rtl-link" rel="stylesheet" type="text/css" href="../assets/css/vendors/bootstrap.css">

    <!-- font-awesome css -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/font-awesome.css">

    <!-- feather icon css -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/feather-icon.css">

    <!-- slick css -->
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/slick/slick.css">
    <link rel="stylesheet" type="text/css" href="../assets/css/vendors/slick/slick-theme.css">

    <!-- Iconly css -->
    <link rel="stylesheet" type="text/css" href="../assets/css/bulk-style.css">

    <!-- Theme css -->
    <link id="color-link" rel="stylesheet" type="text/css" href="../assets/css/demo1.css">

    <style>
        *,
        *:before,
        *:after {
            box-sizing: border-box;
        }

        body {
            font-family: "Open Sans";
            font-weight: 300;
            margin: 2rem;
            background: #4a4a4a;
            -webkit-backface-visibility: hidden;
        }

        h1 {
            text-align: center;
            color: #fff;
            font-weight: 300;
            margin-bottom: 4rem;
        }

        .container {
            width: 80%;
            margin: 0 auto;
        }

        .switch {
            margin: 4rem auto;
        }

        /* main styles */
        .switch {
            width: 24rem;
            position: relative;
        }

        .switch input {
            position: absolute;
            top: 0;
            z-index: 2;
            opacity: 0;
            cursor: pointer;
        }

        .switch input:checked {
            z-index: 1;
        }

        .switch input:checked+label {
            opacity: 1;
            cursor: default;
        }

        .switch input:not(:checked)+label:hover {
            opacity: 0.5;
        }

        .switch label {
            color: #fff;
            opacity: 0.33;
            transition: opacity 0.25s ease;
            cursor: pointer;
        }

        .switch .toggle-outside {
            height: 100%;
            border-radius: 2rem;
            padding: 0.25rem;
            overflow: hidden;
            transition: 0.25s ease all;
        }

        .switch .toggle-inside {
            border-radius: 5rem;
            background: #4a4a4a;
            position: absolute;
            transition: 0.25s ease all;
        }

        .switch--no-label label {
            width: 0;
            height: 0;
            visibility: hidden;
            overflow: hidden;
        }

        .switch--no-label input:checked~.toggle-outside .toggle-inside {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        .switch--no-label input~input:checked~.toggle-outside {
            background: #fff;
        }

        .switch--no-label input~input:checked~.toggle-outside .toggle-inside {
            background: #2ecc71;
        }

        .switch--no-label.switch--vertical {
            width: 3rem;
        }

        .switch--no-label.switch--horizontal {
            width: 6rem;
        }

        .switch--no-label.switch--horizontal input,
        .switch--no-label.switch--horizontal .toggle-outside {
            left: 0;
        }

        .switch--expanding-inner input:checked+label:hover~.toggle-outside .toggle-inside {
            height: 2.5rem;
            width: 2.5rem;
        }

        .switch--expanding-inner.switch--horizontal input:hover~.toggle-outside .toggle-inside {
            width: 3.5rem;
        }

        .switch--expanding-inner.switch--horizontal input:hover~input:checked~.toggle-outside .toggle-inside {
            left: 2.25rem;
        }

        .switch--expanding-inner.switch--vertical input:hover~.toggle-outside .toggle-inside {
            height: 3.5rem;
        }

        .switch--expanding-inner.switch--vertical input:hover~input:checked~.toggle-outside .toggle-inside {
            top: 2.25rem;
        }

        /* mixin */
    </style>
</head>

<body>
    <h1>CSS Switches</h1>
    <div class="container">
        <div class="switch switch--horizontal switch--no-label">
            <input id="radio-e" type="radio" name="third-switch" checked="checked" />
            <label for="radio-e">Off</label>
            <input id="radio-f" type="radio" name="third-switch" />
            <label for="radio-f">On</label><span class="toggle-outside"><span class="toggle-inside"></span></span>
        </div>
        <div class="switch switch--vertical switch--no-label">
            <input id="radio-e" type="radio" name="fourth-switch" checked="checked" />
            <label for="radio-g">Off</label>
            <input id="radio-f" type="radio" name="fourth-switch" />
            <label for="radio-h">On</label><span class="toggle-outside"><span class="toggle-inside"></span></span>
        </div>
        <div class="switch switch--horizontal switch--expanding-inner">
            <input id="radio-i" type="radio" name="fifth-switch" checked="checked" />
            <label for="radio-i">Off</label>
            <input id="radio-j" type="radio" name="fifth-switch" />
            <label for="radio-j">On</label><span class="toggle-outside"><span class="toggle-inside"></span></span>
        </div>
        <div class="switch switch--vertical switch--expanding-inner">
            <input id="radio-k" type="radio" name="sixth-switch" checked="checked" />
            <label for="radio-k">Off</label>
            <input id="radio-l" type="radio" name="sixth-switch" />
            <label for="radio-l">On</label><span class="toggle-outside"><span class="toggle-inside"></span></span>
        </div>
        <div class="switch switch--horizontal switch--no-label switch--expanding-inner">
            <input id="radio-m" type="radio" name="seventh-switch" checked="checked" />
            <label for="radio-m">Off</label>
            <input id="radio-n" type="radio" name="seventh-switch" />
            <label for="radio-n">On</label><span class="toggle-outside"><span class="toggle-inside"></span></span>
        </div>
        <div class="switch switch--vertical switch--no-label switch--expanding-inner">
            <input id="radio-o" type="radio" name="eighth-switch" checked="checked" />
            <label for="radio-o">Off</label>
            <input id="radio-p" type="radio" name="eighth-switch" />
            <label for="radio-p">On</label><span class="toggle-outside"><span class="toggle-inside"></span></span>
        </div>
    </div>
</body>

</html>
