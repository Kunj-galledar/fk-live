    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"

    <!-- bootstrap css -->

    <!-- font-awesome css -->

<body>

    <!-- Coming Soon Section Start -->
    <section class="coming-soon-section pt-0">
        <div class="container-fluid-lg w-100">
            <div class="row">
                <div class="col-lg-5">
                    <div class="coming-box">
                        <div>
                            <div class="coming-title">
                                <img src="assets/images/logo/f-icon.svg" alt="">
                                <h2>Coming Soon...</h2>
                            </div>

                            <div class="coming-timer">
                                <ul>
                                    <li>
                                        <div class="counter">
                                            <div>
                                                <h6 id="days1"></h6>
                                                <p>Days</p>
                                            </div>
                                        </div>
                                    </li>

                                    <li>
                                        <div class="counter">
                                            <div>
                                                <h6 id="hours1"></h6>
                                                <p>Hour</p>
                                            </div>
                                        </div>
                                    </li>

                                    <li>
                                        <div class="counter">
                                            <div>
                                                <h6 id="minutes1"></h6>
                                                <p>Minutes</p>
                                            </div>
                                        </div>
                                    </li>

                                    <li>
                                        <div class="counter">
                                            <div>
                                                <h6 id="seconds1"></h6>
                                                <p>Second</p>
                                            </div>
                                        </div>
                                    </li>
                                </ul>
                            </div>

                            <div class="coming-contain">
                                <p>We are currently working on an awesome new site. Stay tuned for more information.
                                    Subscribe to our newsletter to stay updated on our progress.</p>

                                <div class="coming-form">
                                    <input type="email" class="form-control" id="exampleFormControlInput1"
                                        placeholder="Enter Your Email Address">
                                    <button class="coming-button">Sign Up</button>
                                </div>
                            </div>

                            <div class="social-icon">
                                <ul>
                                    <li class="fb-bg">
                                        <a href="javascript">
                                            <i class="fa-brands fa-facebook-f"></i>
                                        </a>
                                    </li>

                                    <li class="twitter-bg">
                                        <a href="javascript">
                                            <i class="fa-brands fa-twitter"></i>
                                        </a>
                                    </li>

                                    <li class="pint-bg">
                                        <a href="javascript">
                                            <i class="fa-brands fa-pinterest-p"></i>
                                        </a>
                                    </li>

                                    <li class="linkedin-bg">
                                        <a href="javascript">
                                            <i class="fa-brands fa-linkedin-in"></i>
                                        </a>
                                    </li>

                                    <li class="google-bg">
                                        <a href="javascript">
                                            <i class="fa-brands fa-google"></i>
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-7"></div>
            </div>
        </div>
    </section>
    <!-- Coming Soon Section End -->

    <!-- latest jquery-->
    <script src="assets/js/jquery-3.6.0.min.js"></script>

    <!-- latest jquery-->
    <script src="assets/js/jquery-ui.min.js"></script>

    <!-- script js -->
    <script src="assets/js/script.js"></script>
